front:
  text: 丞相魏公譚訓卷第九
  hash: sha256:17622334b5c1f31d3240ef76faedd157809359dfc40b441bb330a00ec94b2812
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0027_SBCK_009-1a}
body:
  text: 道釋神祠疾醫卜相祖父云吾曽祖母代􅀦夫人歸曽祖時賫装中有北極北斗四聖像奉祀甚􅃊自是吾家每至上七日必食素設香茶酒果燈燭奏㝠幣焉曽祖十􅀊時有一道士自云善相髙祖令相曽祖云必達當以文章􅂋髙祖令贈之詩執筆立成㫁章云它年躍馬相逢䖏記得先生舊姓名吕齊物少㳺荆南亦云善相亦通三命馬亮為湖南安撫位八座有徳扵荆人逺地不閑朝儀舉官之尊者必曰安撫尚書吕見祖公每曰它日定為安撫尚書以謂仕當致極品也祖父宰江寕有一僧善三命常閱祖父命曰一府不如推官當至宰輔但不及近日過客王簽判乃荆公也􅂉曰王簽判如何曰有土諸侯祖父間喜皷琴亦常擘阮常侍曽祖􅀁得陳伯華侍御家雷琹既知亳州得太清宫道士王􅀙之静嘿真介恭和忠諒有自得之意非道流之比挈之入都引至太乙宫道衆皆善之陳太初尤重其淳野王皷琴造妙又善斵琴京師謂之琴王師後二十年主宫事及宫庭災斥居九成􅀚政和中象先見之已八十矣聞其歸亳靖康中象先子婿韓晦為酇縣丞聞其尚在年九十矣髙太尉留心醫術得􅀁謂以意為主者常云京師姜粥麻粉日活数千人不必藥也小民㦯癘飲一杯熟􅀬粥出汗夏中暍食一杯冷麻粉即皆愈矣祖父平生不信命術惟為南京幕時婺州衙前葛問精扵星度常謂祖父如杜相公命説平生事殊不差後每至京師必来見南京有衙校與富公同年月日但生時不同尔使問閱之曰貴正在時此賤命與問等耳熈寕乙卯丁已間祖父在杭州天東南有聲如霹􅋬而震不止明日問居人窓牖什器皆動摇㦯至破敗祖父以爲疑廖㤙之祥小醜亦能動天然不知果何祥也曽祖􅁠公安宰常㳺二聖院前此一長老不出院忤府帥夏英公杖而俗之長老仍不出院乃謂院僧曰某無可歸願留院中作行者洒掃寺中乆之益尊信復有人貿祠牒披度府􅂯使住持不辭亦不出人莫測也祖父最重釋氏四十二章經以謂佛法至中􅀦此經首傳猶儒書之論語也祖父喜禅宗見達􅀚曇頴尤契奥妙頴􅀅順化以書貽祖父問及􅇧月委悉有托䕃之意既而生三十一叔㓜而秀異生扵頴乃以頴士為名每書名以水為字年十一侍祖父赴婺州舟敗沒于桐廬祖父言言法師常見之但似無心人祖父俾書一帋後有頴字人謂頴州之應仁宗求嗣使書之末幅有十三字英宗行第十三祖父亦以其吃餑飥為無心李文正公沆䔍好内典啟手足之際了然不亂其弟尚書維亦無疾而終㓜措心浮圗之説尚書􅀅終戒其子以死則削髪披緇為比丘諸子謀扵楊大年大年以謂儒者不當為異服而治命不可廢乃使置三衣扵棺而􅁙祖父常推京口居第乃林肈之舊宅林仕江南為檢校太師宣猛􅀅軍忠扵􅀁事乃為之立庙扵宅之東北山間祖父常云在京師雇一女童乃常為童子卜者􅀁以知人姓名年甲鄊里官爵皆有闗訣語皆誕妄不可信也祖父為舘職時常病寒不知人坐幃帳中覆以缺一字衾衣重裘而􅀾慄不已六七日幾絶家人號泣不知􅀁為有鄭叔熊監簿者泉州人鄊里號神醫適来京師召使診視鄭曰此中􅀬耳乃盡脱衣去衾復使當軒設浴斛坐扵中沃冷水寒慄不可奈氣􅁒絶懇求止水不可増之不已乆乃􅁴氣蒸欎上騰如􅀤甑釡乃使挾置卧榻湏臾大汗数日良已鄭豪邁如義侠在中都果以醫􅂋

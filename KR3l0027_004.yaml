front:
  text: 丞相魏公譚訓卷第四
  hash: sha256:e8fe42e74d6386376a93ef51104e64f4ce212ab57d7326b05fca173bccedea31
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0027_SBCK_004-1a}
body:
  text: 文學詩什梁相為審刑院詳議官從官長奏何次公事仁宗曰漢有字次公者為誰有幾官長奏臣廢學乆詳議官梁適名家子乞召問之上問適適對黄覇字次公盖寛饒亦字次公上大喜頃之除御史由此至大用祖父謁王原叔因論政事仲至侍側原叔令檢書史指之曰此兒有目錄之學祖父受知二宋常謁元憲公曰舍弟子京扵文章少許可􅍦称君文典重而清新及見景文亦曰家兄丞相扵文章少許可每見公近文常称嘆不已常云非􅍦句句有来䖏兼意義清新非近世之文也常言為文之體意不貴異而貴新事不貴僻而貴當語不貴古而貴淳字不貴怪而貴竒二公為文不同而皆相知如此祖父與東坡同在金華因論作賦之方坡云某昔與鄊友課賦日編二十事所謂日計之不足歲計之有餘也祖父曰此乃賢良課程尔喜晏元獻歐文忠小詞以為有騷雅之風而不古不俗尤爱聲韵諧偶然未嘗自作一篇曾祖得雷琴乃故福唐太守陳伯華侍御物黄聱隅覩之感愴黄常舘扵陳氏陳待之甚厚伯華晚歲以贓獲罪遷謫而死祖父觀作詩紀其事聱隅即度拈澄心堂𥿄数番一揮而就三十韵頗淳古其略曰福唐太守天下才好事求竒竭巾楮有時觀我静袪懐到䖏尋幽閑笑侣一朝薏苡足人疑萬里珠璣同梦覩樹墓休提孤劍鐞星垣忽見清絃古好物終難寂寞留髙門即是從容所幾年何地各兮飛此地當歌忽胥遇還記當頭洒涙人同是從前舊承顧中郎一見厚難忘柯亭有竹君知否劉原父豪邁超軼博極羣書文章瑰瑋唯不喜詞賦嘗謂祖父曰縱不取髙第亦不能為州縣之職祖父曰審尔當習賢良二叔祖作賦甚工每笑之揚寘榜劉下第叔祖初考状元以疑混聲知被黜次賈黯榜試戎祀國之大事劉賦如神助警句云仲尼明三慎之文惟齋及戦箕子陳五事之目在祀與師考為状元以執政親嫌降第二名衆為不平叔父第五甲乃知科舉非人力也祖父為南都尹劉莘老為簽判待之甚厚慰荐之及尹京再辟府幕劉後為門下侍郎祖父為左丞為詩貽祖父膺門早歲預登龍儉幕中間托下風敢為弹冠煩貢禹每思疾缺避胡公不乆劉拜右僕射罷祖父繼拜右相吕溱榜試三年大聘韓康公與其弟黄門及右相姪柱史皆髙中無名子嘲之曰府試三年大聘昌黎四子登科以譏主司之有私意正獻聞之俾四人皆不赴省後榜正獻罷四人皆登殊科乃知主司無意也吕文靖當朝正獻登科在第一甲未唱名先奏扵朝自言公著詩賦得意恐在髙等致嫌疑乞降十名後竟從之祖父亦試三年大聘髙中至元祐巳已凡五十三年􅍦祖父與韓持國三人在富公常云朝廷重科名即得王文正韓忠献宋元献李文定諸公不重科名則得章衡羅愷王俊民劉煇但非人事亦是天時也鄭毅夫滕元發皆有塲屋聲鄭賦妙絶惟思遲應天以寔不以文已預殿試自覺不工故曵白而出後廷試数自度不居第一故不終塲至圎丘象天得意甚宋子京為試官侍殿陛即案傍視之鄭展卷宋但云挑起著破題初云大體必簡圜丘自然挑云體大必簡丘圜自然遂冠絶果状元及第元發詩最工為第三􅍦楊元素蜀人無中都之譽遽在滕上謂鄭那得此人来厠我輩鄭曰彼亦有蜀都之譽未易輕誚也滕遂改觀東坡自徐易湖守過闕不得見大人監封丘門以簡問勞且以坐局不獲見為言坡答簡曰便道之官恨不得見詩人耳唱酬詩什簡尺頗多皆為人取去祖父常云劉貢父強記在開封同學方㓜衆令誦霍光傳諸臣奏事不遺一名蔣頴叔父為江寕簿祖父為宰蔣方㓜侍其父来亦能強記其父每呼令誦書史不差一字故頴叔為曽祖母祭文云在昔先人佐夫人之子之竒於夫人義猶祖母曽祖在翰林忤時相以朋黨譛扵上出從外補既而丁髙祖憂服除再入翰林宣召有朝路復清還卿禁直之語然纔八旬復以侍讀知河陽有進士王度獻詩曰風摧秀林木色變附籃絲曽祖甚爱重之髙祖謁盛文肅令曽祖作啟事其畧曰爰從覊貫之始頗能篆刻之工决考秀之科早偕郡計下賢良之詔濫簉公車蔑左右之為容加疎逺之無恃下臣充賦敢矜晁錯之辭考官不留遂棄劉蕡之策盛大喜曰此文可施扵制誥公能不廢茟硯如此乎髙祖曰某廢學已久乃學生代作公即相召曰願一見是時曽祖丁内艱不出髙祖以盛公名重令曽祖製裹而行一見大器重期以逺到後遂荐于朝又舉應賢良由此顯用故曽祖宰無錫中丞王随送行詩曰江吴寕久次知已在朝端爲文肅諸公言也祖父元祐三年爲廷試詳定得李注元發以爲胸臆瓌竒文章浩博似史遷論事有本末布衣而知天下事似陸贄欲以第一人蘇黄門諸公皆不悦曰適出一曽收又擢一曽􅌈不可意不能奪才得乙科士論惜之祖父常云司馬遷文章所以竒者能以少為多以多為少唯唐陸贄得遷文體祖父平生喜元劉詩尤爱其押韵精到曽祖宰無錫朱正辭為轉運使巡部至邑不復訪職事惟相從晏㳺累日朱公卿子少以文辭取髙第而以吏才困扵外補曽祖因和其詩曰一篇此日摛鴻藻五色它年浴鳯文朱大喜以為知已祖父每燕居皆令子弟侍膳每膳畢當戒飭子弟㦯講論古今亹亹不􅌒又常言桞氏訓序太保每以猪胆和黄連為丸令子弟含化使讀書不至困寐故皆篤學有聞尔􅒰當効之祖父言王沂公為舉子投贄梅詩曰如今未作和羮用且向百花頭上開人謂必作状元宰相也祖父常云王文考父逸欲作魯靈光殿賦使文考至魯尋訪事迹文考乃自作賦呈逸逸異之問其遽作之故對曰大人年髙恐勞心爾此可謂承顔順色也祖父過北都與潞公唱和以逋峭對􅉸稽花十八對東西遂賞嘆不已曽祖調無錫宰過金山題詩曰僧依玉鑑光中住人踏金鰲背上行人以為必作翰林學士後十年果為内相祖父言歐公不言文章而喜言政事君謨不言政事而喜論文章各不矜其所長而誇其所不足也祖父言吾少在洪州假黄庠建章集百餘卷所謂千門萬户者後曽祖為三司判官晏元献為使每剪牋簡之餘寘案上得異事聞竒字即抄之貼以大册㦯以簽貼之每用一事即除去後積甚多次第編入抄類㦯謂之類選云晏乃邀黄至門下他客尚数十人使抄莭史書黄去取之晏公出於一手編定祖父為韓康公挽詞云三登慶曆三人第四入熈寕四輔尊又爲吕申公挽詞云两朝京兆尹三世老司空皆切當康公秋試省闈殿試皆第三自樞副參預拜相後爲史館而申公與稚卿皆尹京文穆文靖父子皆爲司空云

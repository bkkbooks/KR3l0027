seq: 1
front:
  text: 丞相魏公譚訓卷第一象先自少不離祖父之側元祐丙寅祖父為天官
  hash: sha256:2ead73b8d720ed9752bebbd16185558c05f347863b9cec103cab68d4d18db8bb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0027_SBCK_001-1a}
body:
  text: 尚書居西岡楊崇訓之故第祖父以南軒為書室誤大案列書史於前又置小案於椅間俾象先侍坐每至夜分退而記平日教誨之言作談訓百餘事後三年祖父執政無復􅇮時閒暇又十有二年􅂢館於潤又十有九年象先在鎮江卧病閱五年當靖康元年偶記􅃇稿而散失脫落尚多遺􅇣因廣而續之凡三百餘篇分為十卷以見一日未常忘祖訓而諄諄之誨不可無傳也􅀦論􅀦政祖父嘗云仁宗皇帝恭儉莭用常服練素不御珍竒臨天下四十年未常妄用一錢常云平生無􅀁好惟修唐書及製雅樂官吏廩稍增秩賜金帋札雌黄金石絲竹之費不過数十萬緡為異時一日宴樂之費爾祖父為吏部尚書因轉對建言􅀦朝典章大抵沿襲唐舊史官􅀁記善惡咸備乞詔迩英臣僚采錄新舊唐書中臣主􅀁行日進数事以輔聖學有詔經筵官遇非講讀日進漢唐故事二條祖父云􅀦家􅀁以太平百三十餘年而因内外無患者只由家法好謂宗室戚里不預政后妃王姬無私謁公族無驕陵世禄之家守禮法至神宗皇帝詔駙馬都尉不升行尤足以風勵天下矣元祐中進用執政多取濮議䑓諫吕微仲范堯夫傅欽之趙大􅀚皆是也趙以戸部侍郎為簽樞於是濮議無不大用矣宣仁聖意頗惻然以經義人情揆之歐公之論為中理公平生不甚留意禮經常與祖父􅀃濮議事尤不平皇伯之􅀃自云某平生何嘗讀儀禮偶至書院中見學生有之遂取而讀見為人後者為其父齋衰杖期云云其言與修意合由是破諸異議自謂得之多矣髙祖太師知復州初應賢良方正進􅃃者百餘人為天下第二被召會罷六科嘗􅌽乘輿上書言丁謂專權􅁀横宜正典刑真宗召入賜食學士院給筆札使盡言之俄亦報聞曾祖内翰景祐中自太常博士應制舉極言時政得失與吴春卿同中初考三上覆考陞春卿曾祖第四等詳定從覆考授祠部貟外郎通判洪州不十年入翰林為學士初既覆考作两絶句其畧云恠問淄川等第移是也祖父言吾在金華每進對至弭兵息民則必反覆條奏援引古義以為人主聪明不可有􅀁嚮有􅀁嚮則有偏有偏則為患大矣以是心應是事則天下無不治矣祖父元豐初使虜囬陛對神宗問虜中山川形􅀔人情向背祖父言虜講和日乆頗竊中􅀦典章禮儀以維持其政令上下相安未有離􅏗之意昔人以謂匈奴直百年之運言其盛衰有数也上曰虜自耶律徳光何止百年祖父曰漢武帝自謂髙皇帝遺朕平城之􅁨雖乆勤征討而匈奴終不服至宣帝時呼韓單于稽首稱蕃唐自中葉以後河隍䧟扵吐蕃憲宗每􅄃正􅀚政要慨然有􅀵復意至宣宗時乃以三􅀜七州歸于有司由此觀之夷狄之叛服不常夷狄之外復有夷狄出不繋中􅀦之盛衰也上深然之大人熈寕初太學對策頗言新法不便第二十二叔亦偕試大人考第一叔父第五策既傳流執政以為横議􅀅究治其言乆之而􅃦􅍦罷考官直講焦千之顔復数人而已祖父常言吾生平未嘗以私事干人至於陛立奏對惟義理之言故歴事四朝中間雖􅁶謫不愧扵觀過矣祖父知滄州陛辭上曰卿又當逺守如卿宜在朝廷朕知卿乆矣每欲用卿輙為事奪豈非命耶祖父曰非敢言命乃臣愚戅自取上曰如卿直道乆而自明因語及偏親留京師未能偕行上曰卿母誰氏具以對上曰是仁宗天聖間侍從耶祖父曰臣外祖天聖間以直昭文館知廣州罷還不市南物輦俸餘見緡過嶺仁宗聞之即日擢知制誥上曰清莭過扵馬援矣宜其有賢女也故謝表云憫臣之数竒多難時軫淵衷謂臣以直道自明屡形天語初陳龍圗為舘職十数年不遷居䘮時士大夫有致賻者公不拒服除知廣州罷官不市南物既輦俸餘過嶺半以償贈賻者半以班宗族之貧者故上有馬援之語祖父拜尚書左丞是時韓師朴同知樞宻院許冲元為右丞皆先入舊制左右丞同知樞宻院以除授先後為立班之次詔祖父立班在韓上許在韓下可見宣仁􅈒廟眷注之意踰年遂拜右僕射㑹牽復前侍御史賈易知蘇州争不决至論扵上前祖父曰易與臣本無雅故以其為御史不避􅁠要號為敢言又法應牽復既已為監司矣乃除蘇州則是雖更赦反下遷兼其餘當牽復者甚衆使人人如易則赦令為虚文矣衆欲加易以舘職祖父亦為不可有㫖再議而御史楊畏来之邵以為稽留詔命又言知杭州待制林希禮部侍郎張巘閻木自太學博士􅁶太常博士鄒浩自許州教授􅁶太學博士以為交結子弟祖父聞之即日歸私第稱疾辭位二府諸公相過蘇黄門云莫湏翌日見上少叙陳然後求罷貴全進退之禮祖父言宰相一有人言乃是物議不􅁢豈有觧紛之理三上不􅁢陛對􅂯上一札力辭老病乃罷為􅀚文殿大學士集禧􅀚使􅀦史本傳言與同列議事不合鋭然求退云云然􅀁言数人者皆名賢􅀚過知仁可以無愧矣㤗陵既親政畏等首論二蘇不遺餘力相􅁇南􅁶權輿於楊氏也祖父執政時諸公奏對惟白宣仁􅈒宗有言㦯無對者祖父奏事宣仁必再禀哲宗有宣諭必告諸公以聴聖語哲宗盖黙識之罷相後哲宗親政張商英為御史常論列元祐執政至祖父上曰蘇某知君臣之禮與他人不同祖父在元祐間不取諸公太紛紛常云君長誰任其咎耶祖父自元豐中滄州被召修官制陛對日上曰自北虜通好八十餘年故事式儀遺散者多每使人来生事無以折正朕欲裒集􅀦朝以来至昨代州定地界文字以􅀋編次為書使後得以稽㩀非卿不可然此書浩繁卿自度幾􅀊可成祖父曰臣願盡力二年上曰二年了得甚善因令置局於樞宻後􅆹仍辟官檢閱文字如期書成親筆賜名華戎魯衛信錄至奏篇上上讀序引大称賞曰正􅀋序卦之文書成使官属王汝翼同上殿捧書進呈上自令一内侍捧之同入禁中留書御榻王汝翼面賜六品服皆非故事盖舊制書成進呈訖下殿至閤門方進入而神宗未嘗輕賜予也元豐五年為北虜賀正館伴使虜使鄭顓明辨有才智上命副使張山甫喻以近命蘇某修信錄欲重两朝盟好之固顓感激称謝見祖父益恭遜私覿禮物皆異常時上遣使喻㫖曰聞虜使以卿儒學醖藉贈遺特殊今以小龍茶瑠璃器賜卿可予之以荅其意顓復遺異錦一端即日進之後因奏事語及上曰禁中􅀁無也祖父元祐中被召重修渾儀置局辟属扵印經院以吏部令史韓公亷為管勾製造公亷天性機巧知天文暦算製器尚象無不精巧與祖父意合及成奏之二聖臨􅀚称賞紹聖中日官言其非是詔近臣覆視視以其法為宻不可改也當是時更張元祐事無復餘藴􅍦渾儀不能改革祖父嘉祐中奏詔同修本草圗經時掌禹錫大卿為官長博而寡要昧扵才識筆削定著皆出祖父之手祖父知滄州神宗方修官制一新政典祖父被召同詳定每有􅀁擬令樞宻承㫖張成一就第訪問無不嘆美而從之文潞公常謂祖父今之魏相也􅀁謂好􅀚漢律令便宜章奏可以㫁􅀦論矣王欽􅀂定天書制度禮儀蔚縟時議譏之初天書未之降也真宗訪其事於宰相王文正文正曰聖人以神道設教亦􅀁以行􅁠也上意遂定㦯以文正為􅀅順議者以謂自太祖革命雖規模宏逺而日不暇給太祖功成治定而河東猶拒命車書未一真宗之初北虜有澶淵之役人心未寕㦯假天命以鎮拊之􅀁謂神道設教非志於􅀅順也祖父􅁠知審刑院時知金州張仲宣坐枉法􅂍罪至死法官援李希輔例貸死杖脊黥􅈻海島祖父奏曰希輔仲宣均為枉法而情有輕重上諤然曰枉法豈復有輕重先祖曰希輔知台州受賕数百千額外度僧仲宣則以􅀁部金坑􅀤檄廵檢躰究無甚利土人惮興作遂以金八两求仲宣不差官比較止係違令可比恐喝條耳故於枉法為輕上曰免决黥之如何祖父曰士大夫有罪可殺則殺之古者刑不上大夫今仲宣官五品有罪得乘車今貸其死而黥之使與徒􅈻為伍􅀁重者汚辱衣冠頋其人無足矜上咲曰惡傷其􅀋君子之用心也免决與黥流嶺外自是為例有三免之恩祖父元祐中為吏部尚書時宰執陳乞恩例居在部之上裁造院闕當用知州人時有以本資投状者而執政子以初任監兼當得之祖父具陳超踰太過􅀌寒被抑太甚乞為定制超除不得過三等從之遂為定令既而祖父執政乆不用恩例踰年伯父以通判射布庫叔父以幕職官射􅉸州推官而已祖父元祐二年四月除尚書右丞吕司空奏方有族人訴昭穆事在省遂改命王正仲五年三月方左丞八年三月罷右僕射為集禧觀使紹聖中蔡衡州重修􅁉陵寔錄其叙吴丞相言充在政府数言新法不便又多荐引王安石􅀁斥退之人司馬某吕某晦叔韓某持􅀦蘇某等吴雖為相未乆其􅀁施設天下属望以為賢相一時荐引者皆􅁇踵為賢輔此事過扵張説識㧞房太尉張曲江矣方熈寕之初神宗梦以項安莭為相翌日追班簿及吏部名籍閱視無有也既又稽考太學士人姓名亦無之久之吴相寖被知遇常以疾在告既出上偶問以疾状吳對頸項間有贅瘤近疾作甚不能轉側上亦悟昔日之梦眷注日􅂭遂冠台席豈偶然耶惜乎其嗇扵命也時又方之楊綰云

front:
  text: 丞相魏公譚訓卷第二
  hash: sha256:c843da34fee7e33f3498edf38db547c73a3744f4d40fdc6a0b70275f5c5da085
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0027_SBCK_002-1a}
body:
  text: 家世曾祖寳元康定慶曆間為侍從前後八年自以邅遇不世出之主知無不言仁宗眷遇尤渥言無不用章䟽無虚日未常不欣納如言章某無重望賈某太專寵及龎某有帥才梁某能應變皆可大用辨王德言之忠言狄青當駕馭荐張康莭曾魯公奏議甚多有見於國史者竟為執政譛以朋黨出從外補髙祖為左侍禁閤門祗候荆湖北路提刑仁宗以曾祖在侍從從容問家世因及覆落事詔授左屯衛将軍仍舊官崔公度伯易罷潤守過維揚象先往訪之来報謁坐中小子趙孫出因令拜焉崔喜曰今日遂識公家六世矣公度少㳺湖北屯衛公典景陵因得請謁屯衛一見異日館於書室俾教公之二曾叔祖其後䝉朝廷收用遂得趨見丞相某以文字焉縁二叔之契復州之事不敢言既而識尊君昆弟今又見公與令子頋公度之衰朽如此非唯自喜亦自嘆也六代祖諱光晦五代末為漳州刾史性至孝母夫人年踰八十甘㫖皆親調每旦朝莭序召州之官吏士子母若祖母與太夫人年相若者具酒饌與太夫人宴㳺終日以娱親心太夫人有疾衣不觧帶藥必親嘗焚香禱祠寝食皆廢鄰郡聞風嚮慕及留從効納欵中朝檄喻漳州之豪傑率数十人擁太守拒之六代祖初未知適從既而從効遣将来援具言司徒忠孝令将委質上都必識順逆之理六代祖開門納從効之衆從効復以計召六代祖舉族居之晋江及盗起游揚遂推六代祖為盟主六代祖喻之云爾若識順逆之理則吾從汝不然殺我亦不從也衆欣然既而舉族自㧞歸朝太祖詔授屯衛将軍監在京倉官其十子􅍦五代祖以平生孝飬扵母夫人夫人留漳州遂復南歸授江南祭酒之命方漳人拒命之時有籍其姓名投扵刾史者五代祖寔掌之及納從効之衆五代祖悉焚其籍六代祖聞之曰汝之後必有顯不止活千人矣及髙祖之生六代祖甚爱之曰吾有此孫入地無恨矣真宗時㦯荐梅詢可用者上曰李沆常言其非君子時沆已沒歐陽文忠公問祖父宰相沒二十年能使人主追思其言以何道祖父曰獨以無心故爾東坡載之志林乾符之亂吾宗自光之固始遷泉之晋江同王潮諸族行曽魯公之先亦遷焉令閩人之仕扵朝者多固始族也祖父常云唐人與主司名第同者謂之傳衣鉢先内翰第一甲得職官吾第三甲亦得職官尔若得職官亦傳衣鉢也時象先赴庭試髙祖淳化庚寅歲年十六預郷荐曾祖大中祥符壬子歲年十四亦預鄉書髙祖数下第曽祖再舉並以天禧已未歲王整榜登科髙祖既赴其集坐間因石延年数人覆落乆之授右列庚寅距已未三十四年髙祖数應賢科不遂命也曽祖康定二年使北虜為母后生辰使虜主望見曾祖儀觀大竒異之及宴躬至坐次持大杯手酌盈升曽祖嚼之虜人嘆息以謂自通好幾四十年未有如此禮也手抄語錄見藏於家祖父題扵後以賜象先時年八十二後数月薨祖父知杭州髙麗貢使崔思訓過郡相見謂接伴忘其名曰蘇公誰之後髙以寔對崔嘆曰府公厚徳重望大儒之後昨奉使北朝常見其風采令人仰嘆不已也祖父常戒子孫曰吾宗自許公顯扵唐其後㦯隐㦯顯以至於今仕本朝者七世矣忠孝文行士大夫以為名族汝輩宜慎守家法勿使墜廢則吾無憂矣文華尤可後也祖父常称唐族惟盧桞善教子弟以嚴謹盖易所謂家人嗃嗃終吉者故其子弟多保家之主如晋之王謝惟以文華風雅為事故多不壽而取祸敗不足尚也盧氏自𣏌以姦邪取宰相其族始衰惟桞與唐終始尤可貴乃取桞氏訓序一篇令子孫皆抄錄閱視祖父教子孫以義方可知也祖父以宫使歸潤㞐化龍之新第著百韵詩以代家訓具述祖先基業平生艱勤邅遇始終之大綱訓飭子孫俾之謹守家法無墜世緒也髙祖從郷書数至京師不歸者十年曽祖後亦計偕航海至京師寓扵僧舎父子不能誰何曽祖推訪知之亟来見髙祖髙祖不知㦯告曰此君之子也遂相持涕泣曽祖知制誥乾元莭當任子初奏必以子孫祖父固辭復勸二叔祖當勵志科舉不當從門䕃两祖亦辭曾祖大怒曰尔既輕朝命又教二弟何也既而曰志氣如此可矣但不可䧟為輕薄竟奏第七叔祖後先祖與二叔祖同赴庭試二叔祖考中首選雜犯黜落再舉纔中下科復用䕃换京秩三叔祖常獲髙荐不第亦從䕃補而祖父竟不授髙祖至孝母代國夫人張氏乃泉南之甲族家富扵財歸吾宗時衣帳奴十人婢十人書十厨他物称是張夫人既老喜為郷談髙祖戒子孫奴婢皆効閩音讀韓詩李杜文章在光㷔萬丈長祖父每學其謦咳思慕焉有一婢號宜子張夫人每使從祖父嬉戯為鄉談咲樂元祐六年象先䝉恩賜第祖父謂賀客曰本朝五世登科者唯衰族爾故劉彦和詩有五世登科只一家之句其後晁氏韓氏皆五世登科熈寕九年祖父同修國史開局日賜李廷珪墨子承晏笏挺雙脊龍張遇丸墨澄心堂𥿄及對上曰禁中自此少矣宜寳之王岐公為相先留数丸笑曰所謂搯尖大人改京秩引對上問張誠一上常遣至祖父私第某大人與某二十二叔父誠一對未常識之然聞蘇某二子某某頗有學問元厚之常對上言與祖父連􅊚上又問第幾子奏以某季父曽祖知慶曆三年舉祖父知熈寕三年舉得人之盛皆多扵此榜曽祖寳元康定中知制誥祖父熈寕初知制誥曾祖祖父皆典内制並載衣冠盛事曽祖母捐舘祖父為吏部侍郎上遣貴璫慰問云早聞太夫人之䘮想卿情極哀慕方當盛暑宜少莭摧毀皆上語也親筆書扵貴璫之笏翌日又賜白金千两敕州縣應接其䘮事皆異禮也

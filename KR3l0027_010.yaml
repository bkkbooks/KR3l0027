front:
  text: 丞相魏公談訓卷第十
  hash: sha256:5232d1c5761e63e95321463d76aa13f632f0e37c37929f4ce897a0d5e4321deb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0027_SBCK_010-1a}
body:
  text: 雜事祖父既拜大學士集禧觀使入謝乃徹蓋服御仙花帶蓋寄祿官乃光祿大夫也兩宫嘆異降㫖張蓋服毬文帶告街鳴杖子立宰相班蓋異恩也八年九月出知揚州哲宗始親政因陛辭尤加眷禮問為政大略與人才能否祖父奏對移時至郤御膳且有召用意明年西京留守闕首命除祖父當過闕陛對祖父以老再辭不聽既行次符離而衛國夫人薨懇請南歸復知揚州時紹聖元年明年再請還政章纍上哲宗特命拜中太乙宫使又一年復請老哲宗聖諭令且降詔而時宰奏得蘇某書𣣔得致仕有㫖檢例遂用杜祁公例拜太子少師致仕國史祁公傳言前宰相未有一上章以東宫三少致仕者蓋時相賈某嫉之也章雷州既罷以特進知越州過潤祖父遣二十二叔父四十叔父相見甚欵既而以簡謝祖父曰到㑹稽不久則丐間將卜居京口異時當從公杖履之遊也翟思子久祭祖父其云問萬事于伯始無所不知夢兩楹于殷商遽然求訣實其子汝文代作常語人曰此惟蘇丞相可以當之元豐時彥榜二十二叔父登科是時祖父出從外補有表謝上首言方主臣之負罪適孺子之逢辰報始傳郵慶叢私室又曰一門在仕三世决科逮于群從之間繼有策名之美斯亦聖代衣冠之盛事不勝逺方父子之遭逢蓋是天禧至是蓋四世九人登科矣象先近見祖父是年四月與十六伯父書亦言念二得科名家門之慶想同歡慰至元祐馬㳙榜象先䝉恩賜第至是五世矣此六事合在前昨見伯父房折弟植殘稿中有之今並見此卷之首祖父嘉祐中在館閣曾祖召飰如期而往傳命者云請帽皆就坐祖父令禀白京局小官自來衫帽不以擕行欲幞頭簉席曽祖甚喜蓋前輩雖燕居未常露頭也祖父時子弟皆昏定晨省及侍膳白事率皆如此不若近時之苟且也祖父薨背賢士大夫祭文甚衆惟南豐曽相之文委曲周盡頗無遺事若行狀然學士畢公仲遊自言韓富亡有司馬司馬亡忠宣是侔忠宣亡後舊相惟公今公又亡故老遂空鄒道鄉曰某常聞公之緒言矣學至于絶學心至于無心消息盈虛自與時㑹世雖欲親疏利害之不可得也文皆冠絶一時陸農師挽詩云始知夷險異髙卧看南行亦紀實也此二事亦殘稿中所藏者東坡常稱東漢多名莭之士所以能扶危持顛者幾百年雖曹孟德之奸雄亦畏名莭故終躬不敢取漢一日與大人語及大人云近見新貴人為人作志文頗譏東漢之士專為詭行盜名其風不可長東坡大駭固問誰作不得已言之東坡云可作數字罵此小子大人不應乃曰只教折了胡孫三十年草料安厚卿父為三司吏曽祖為判官見而異之以謂與胥吏不同必有厚福每令祖父禮待之祖母兖國夫人來歸使幹禮席之事安甚盡心後為正議大夫致仕年九十而卒每子孫在側必以曽祖教子以訓飭之祖父常言韓正獻教子嚴肅不可犯知亳州日第二子舍人自西京倅謁告省覲康公與右相及姪柱史宗彥皆中殊科歸公喜召僚屬之厚者俾諸子坐于一隅惟持國多深思必有義方之訓託疾不赴坐中忽云二郎吾聞西京吾疑獄奏讞者其詳云何舍人思之未得已呵之再問未能對遂推案持梃大詬曰汝食朝廷厚祿倅二一府事無巨細皆當究心大辟奏案尚不能記則細務不舉可知矣吾千里外無所干預猶能知之爾叨冒廪祿何顔報國必𣣔撻之衆賔力解方已諸子股栗纍日不能釋家法之嚴如此所以多賢子弟也祖宗時進士甲科推恩無定制據人才收用陳堯咨狀元及第曽㑹第二人皆直史館知大藩陳州人得閬州㑹江南人得宣州而第三人才得職官太宗朝狀元王世則止得司理參軍後至樞密使吕文靖少時伯父司空不以任子荐之宗親為言司空曰彼當自致公輔豈可以門閲卑之後中甲科為職官月俸五千八百乃約家人日用不過百金有餘置竹筒盛之一千以供太夫人一千以卑內子八百以備伏臘竹筒之積具飯以待同寮上下欣然無不足之色後果繼世父官鈞慶院賜晏官食方暑不可下箸曽祖居與相對兖國太夫人治家乃排五六十位但具匕筯置白餅縷肉飯下飯瓜姜醎豉爾人人至者自食飽足後吕司空每見必戲曰未常忘一飯之德也祖父常言在館中時雇得一婢問其家何為云住曹門外惟鎚石蓮問一家幾人各何為云十口皆然無他業初甚訝之又云非􅍦某家一巷數十家皆然蓋夏末梁山泊諸道載蓮子百十車皆投此巷鎚取蓮肉貨于果子行乃知京師浩瀚何所不有非外方耳目所及也祖父為省判判剝馬案行衆爭取死馬而不取駝牛以謂馬肉耐久埋之爛泥地中經宿出之如新為脯臘可敵獐鹿皆稅居曹門鄰巷皆貨之醎豉者早行其臭不可近晚過之香聞數百步多馬肉為之祖父又言常步至門外見臭河中浸弊草破履皆將為㳿子者京師無棄物所以皆人人粗給祖父常言忠信度量豈惟士大夫貨殖猶然孫賜號本行酒家博士誠實不欺主人愛之假以百千使為腳店孫固辭主人曰不責還期也孫曰請以一歲為約先期已還足貨于人者不計其可償其貨漸侈大乃置圗畫于壁間列書史于几案為雅戲之具皆不凡人競趍之久之遂開正店建樓漸傾中都太宗上元為微行至其家孫巳預知蓋耳目廣又結中貴人得其歡心上與柴都尉數公往孫出致恭呼大人先集京師名姬妙藝杯盤精好羅列于外上大喜酒十行將散乃前致謝曰家有間處願諸大人一臨太宗與諸公相顧駭喜及至其廳事杯杓器皿陳設歌舞尤盛遂使其女彈琵琶獻酒侍上傍通席極歡而罷坐中使柴都尉取錦綺金銀卑之固不受及明上使勞賜召其女入其後寵以正位號一日上使于奉宸庫取真珠擇其圎者為數珠不足妃侍傍曰妾父好畜異物碩令一使往問之孫默記曰數年前有一行頭寄真珠一篋為信云絶大未常開也乃引使于藏私帑室塵埃中取得之元未啓封發視乃喜賜銀百星一日上置晏西蜀進酴醿種方開上與妃后賞玩孫妃曰妾家亦有試遣問之乃進十合上大駭以為竊禁中種使往視之則其本大于禁中數倍矣孫貸于人者前期而還人貸之者不復問數月則㷊其劵不可勝紀有一行頭貸萬緡三年為期不至故以大珠為謝孫之致富皆以信與量而已孫居與向相敏中為鄰向闕宅後地一方未得完備及孫死妃亦得罪以憂卒向𣣔圗其地孫氏巨富豈可得一牙儈見向曰相公𣣔得宅地乎請以十年為度某將致之向初不為然後十年牙儈持帳來賀曰廣地如期矣大喜不問價髙下亟售之又以百千與牙儈而問曰始汝𣣔取孫氏地以廣吾居孫巨億萬無可得之理今汝言果然固以異矣且汝必以十年為期何也對曰孫氏諸子其鄰于相公者第幾子殿直不惟日縱酒博奕狎遊無度又日有遊手數百人田獵逰燕日賦無藝某計其所分不過若干十年必盡而貿所居矣向大賞異之胡武平樞密䔍信鬼神任州縣事湖南有一士人家世白屋既登第母死𣣔迎父之官父不肯遂鬻一村婦使侍父傍久之父與之處如伉儷士人罷歸知其父意稍加以禮後移令固復請迎父父又不肯在官以書省其父乃以娘子謂村婦以順適父意久之父與此婦失歡怒投觀中為道士數日復歸又遣召婦及士人改著作郎知湖北一縣又固迎父父又不肯踰年卒士人奔歸婦據堂上為真母久之呵罵子婦不已䆮以杖捶之士人不勝其憤遂還其杖婦仆地曰毆母不孝走之郡且持士人書以往郡如言究治士人具陳本末然父既命為妻又常以母稱之無以自明遂承驅母每至録問輒不承既三移獄使者乃使武平鞫其情武平既至齊七日求夢于神七日晨起夢㦯呼曰何不問道士武平悟曰道士不當有室家亟使訊觀中父既歸度牒何在乃尚留觀中未納也武平曰此尚道士不當有室家如此非母矣報使者士人遂自明武平為殿試詳定官長齊戒沐浴禱於神求可為魁者首拈一卷紙藉精好書札真楷遂定為第一乃章子平也曽祖慶曆初為翰林學士所賜金帶後祖父為侍郎尚書以至翰長皆服此帶以為傳世榮耀晚年復命工人修治訓飭子孫它日官當服者即付之今緘藏季父位大人元豐中為襄邑丞髙麗遣使趨闕隆冬過境邑宰柯仲常與同寮部人卒擊凍挽舟提轄中官陳衍風邑官戎服持柱斧行督大人曰吾輩豈可為此服率不易坐胡牀臨視衍大怒劾慢令神宗付提點司體量楊康功保奏無它事遂平大人為襄邑丞王冲党侣侵軼京畿朝廷遣燕順為提舉捉殺縣官迎見順自坐南面設邑官坐東西向大人望見諭同寮曰此豈可就坐不揖而退其其事于府奏之神宗大怒罷順罰銅三十斤人莫不稱快云所謂仁者之勇也大人從三司使李奉世辟監景陽門後舉京官以啓謝之曰函谷著書遙想真人之氣夷門擊柝敢􅌽公子之車李大稱賞不已後見其子弟皆能記之祖父宰江寧楊告諫議為守常曰公治邑無一事不中理公無過矣祖父曰縣道繁劇多過公罪日積數十但公過以百數某自知之出于無可奈何但顧人情何如而無私心爾豈容無責不敢不置懷也告驚曰此三十年為吏者不能知公知之何患不治大人宰富陽富陽大邑號難治既至究心民事辨滯訴數十遂以大治子瞻見祖父曰聞富陽之政雖古循吏無以過祖父知婺州大人侍過㭇東坡為倅自明久講宗盟之好東坡稱祖父為宗叔府㑹外自請逰西湖終日將起曰明日欲復􅌽宗弟先是東坡録近詩一卷呈祖父祖父和之大人亦繼作大相稱賞祖父謝其敦䔍明日遂遍遊湖山頗有詩什及大人還赴亳椽子瞻謂曰鄊人楊元素守亳煩附一書并致子由一信及常茶一瓶蓋東坡𣣔致委曲荐大人於元素而不欲言故託以附子由信後見書果言宗椽乃丞相字子督學有文而沉靜若愚剛毅不可犯及見元素稍異待既而陳述古自旁郡移南都過亳復有㫖還舊任大人為作樂語云銅符方拜新留守竹馬還迎舊使君楊陳大喜自此相知尤深督學字不知别有據否象先常得髙祖以來所用李廷圭墨一挺於祖父使寶之長四寸濶一寸厚一寸其色之黑世無物及者研之無聲一面有李廷圭墨四字象先常得楷木笏於叔祖奉職乃髙祖舊物孔墓之三間槐也長尺有四寸厚五寸濶二寸半紋似松而有鱗理兩邊二紋徹上下透內外如間道故謂之三間他處所見殆未有及者祖父初拜尚書左丞相請于朝以潤之因勝院為墳寺且乞以因勝報親禪院為額既得請仍以舊住持人道澄主之適黃山谷見訪延之書院語論甚欵仍俾作請疏黃坐上立成曰因勝得名舊矣報親自天錫之山月林扉㦯改衆人之觀粥魚齊鼓豈異嚮時之聲舊住長老澄公透黃龍之三關用林濟之一喝􅍦以道為伴侣不隨世而陳新瓶水爐香終借松楸之潤曉猿夜鶴將從杖履之遊今集中無此文故見于是祖父常云俳優非􅉸稽捷給善中事情能諷諫有足取者仁宗作賞花釣魚晏賜詩執政諸公洎禁從館閣皆屬和而徘徊二字無他義諸公進和篇皆押徘徊在坐教坊雜戲為數人尋訪稅第至一宅入觀之至前堂之後問所以曰徘徊也又至後堂東西序亦問之皆曰徘徊也一人笑曰可則可矣徘徊太多爾神宗勵精求治博訪人材雖州縣小吏亦引之登對春晏優人引數輩牽一驢至殿階衛士叱之復來不已問之曰汝何人敢牽驢子至此𣣔何之對曰我以謂有腳者皆可上殿爾鄧綰為中丞時譏其不盡言一日優人進戲作都水官數人共議秋水泛溢將閉汴口以免泛濫之虞一人曰丁家口可開乎曰多良田不可又曰杜家口可開乎曰經涉州縣不可開一人曰鄧家口可開乎乃曰此口奉勑不得開耳哲宗為延安郡王奉晏侍坐上旁優人指曰此為誰乎㦯曰皇子大王曰非也又曰太尉相公開府郡王皆曰非也然則為誰曰假承務郎時新行官别任子多為假承務郎位最卑四者皆得天顔一笑傳播都下皆祖父侍晏所見者於父言康定歲春間侍曾祖居西岡與二蔡賢良同學時二蔡赴試畢榜將出率祖父同至巷前聼響卜約以二姓皆執一物㦯鏡㦯磬㦯刀先聞而無情者為凖才出巷忽聞一散從官執杖子呼云下引作去聲諸君相顧曰事可知矣乃中丞作考試官畢歸第爾既而二蔡果不遇於父平生喜讀莊子及守濠梁莊墓在開元寺乃賦百韵詩理趣曲盡莊生之妙祖父常言幼時華直溫相率至其家每日將晚群婢取燈盞數十漬以水取易涸者去之恐其耗油也治家有理蓋事事可法如此祖父常得徐鉉李王墓碣云武侯以﨑嶇之地拙于應變偃王以仁義之師終于亡國當時以此得罪太宗終躬不復召祖父常說在滄州時有一漁師獻一魚如戴作冠婦人所戴謂之垂肩者因言海中色色有之世所有之物皆有肖似者犀如牛江豚如猪腽肭臍如狸此衆所知所見者竒形怪狀不可勝紀每有獻異物者皆爆以為臘寄公庫甚多有如美婦人者有如嬰兒者有如翁姥者皆可駭異一日漁人獻一腽肭臍置一大桶中以水飬之鮮健善啖可久飬祖父恐其失性傷生不納之後元祐中有挈至京師者自王侯戚里富豪之家無不取觀所得甚厚謂之海哥亦常轉入禁中甚有謡詠不知是何祥也祖父為尚書左丞劉莘老作詩感舊言懷祖父既和蓋是時執政侍從館閣朝士皆和李格非既編集又作序以傳惟中書傅欽止和公字韵一聫云此時廊廟聫三省它日貂蟬㝎兩公時以詩䜟蓋祖公任左丞相劉黃門傅中書范堯夫罷相劉公遷右揆明年劉出而傅已前卒祖公遂大拜傅果不得相是乃它日貂蟬定兩公之䜟也陳秀公知揚州墳墓在潤常請于朝每歲寒食十月旦乞至郡展省如所請故林希後作公挽詩言傷心父老江津路猶想當年上塜行謂此元祐八年祖父罷相以集禧使居京師更厯之時出守廣陵遂援前比亦乞以時過家上冡得請故祖父謝上表云淮海奧區名在九州之列松椒故國地才一水之遙緣近歲守臣之文有過家上冡之例揚州芍藥冠絶天下蓋京洛牡丹之比慶曆中韓魏公出鎮倅簽則禹玉介甫也春時後圃一本發四葩竒甚魏公于圃中㑹四客以賞之乃重臺紫花金束腰土俗謂之樓子芍藥宿約一客及期以疾不能赴公命於河亭索牌欲命一客足之是日過客絶少􅍦有一陳莭推公不熟何人乃令邀之即來乃陳暘叔也後四公皆至宰輔祖父常對客話之後象先為郡糾曹州人尚能言之元祐七年祖父與吕微仲同為相暇日因言大人纍任京局且以宰執子弟例除館職欲以用之祖父答以館職乃朝廷育才之地豈可令子弟以例得之吕唯唯而已熊本侍郎常夢祖父遺之三硯熙寧三年祖父知制誥以屢繳李定詞頭不草制罷職熊遂召試元豐六年祖父自吏部侍郎丁秦國太夫人憂熊乃除天官二卿元祐初祖父寢被知遇熊心不能無觖望而止於侍郎以沒豈造夢者故相戲謔邪其偶然也蘇魏公談訓十卷公之意苐欲示訓子孫不祈於傳也泌既得之於公之曾孫無為判官輝因刻之郡府紹熙癸丑孟夏八月濟南周泌

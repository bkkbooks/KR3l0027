front:
  text: 丞相魏公談訓卷第一象先自少不離祖父之側元祐丙寅祖父為天官
  hash: sha256:317952cc409b3239c0a10d72e008cac03385a13752dd463209e1dc8c25625236
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0027_SBCK_001-1a}
body:
  text: 尚書居西岡楊崇訓之故第祖父以南軒為書室誤大案列書史於前又置小案於椅間俾象先侍坐每至夜分退而記平日教誨之言作談訓百餘事後三年祖父執政無復曩時間暇又十有二年捐館於潤又十有九年象先在鎮江卧病閲五年當靖康元年偶記舊稿而散失脫落尚多遺逸因廣而續之凡三百餘篇分為十卷以見一日未常忘祖訓而諄諄之誨不可無傳也國論國政祖父嘗云仁宗皇帝恭儉莭用常服練素不御珍竒臨天下四十年未常妄用一錢常云平生無所好惟修唐書及製雅樂官吏廩稍增秩賜金紙札雌黃金石絲竹之費不過數十萬緡為異時一日宴樂之費爾祖父為吏部尚書因轉對建言國朝典章大抵沿襲唐舊史官所記善惡咸備乞詔邇英臣僚采録新舊唐書中臣主所行日進數事以輔聖學有詔經筵官遇非講讀日進漢唐故事二條祖父云國家所以太平百三十餘年而因內外無患者只由家法好謂宗室戚里不預政后妃王姬無私謁公族無驕陵世祿之家守禮法至神宗皇帝詔駙馬都尉不升行尤足以風勵天下矣元祐中進用執政多取濮議臺諫吕微仲范堯夫傅欽之趙大觀皆是也趙以戶部侍郎為簽樞於是濮議無不大用矣宣仁聖意頗惻然以經義人情揆之歐公之論為中理公平生不甚留意禮經常與祖父説濮議事尤不平皇伯之説自云某平生何嘗讀儀禮偶至書院中見學生有之遂取而讀見為人後者為其父齋衰杖期云云其言與修意合由是破諸異議自謂得之多矣髙祖太師知復州初應賢良方正進卷者百餘人為天下第二被召會罷六科嘗􅌽乘輿上書言丁謂專權暴橫宜正典刑真宗召入賜食學士院給筆札使盡言之俄亦報聞曾祖內翰景祐中自太常博士應制舉極言時政得失與吳春卿同中初考三上覆考升春卿曾祖第四等詳定從覆考授祠部貟外郎通判洪州不十年入翰林為學士初既覆考作兩絶句其略云怪問淄川等第移是也祖父言吾在金華每進對至弭兵息民則必反覆條奏援引古義以為人主聰明不可有所嚮有所嚮則有偏有偏則為患大矣以是心應是事則天下無不治矣祖父元豐初使虜回陛對神宗問虜中山川形勢人情向背祖父言虜講和日久頗竊中國典章禮儀以維持其政令上下相安未有離二之意昔人以謂胸奴直百年之運言其盛衰有數也上曰虜自耶律德光何止百年祖父曰漢武帝自謂髙皇帝遺朕平城之憂雖久勤征討而胸奴終不服至宣帝時呼韓單于稽首稱蕃唐自中葉以後河隍陷于吐蕃憲宗每攬正觀政要慨然有收復意至宣宗時乃以三關七州歸于有司由此觀之夷狄之叛服不常夷狄之外復有夷狄出不繫中國之盛衰也上深然之大人熙寧初太學對策頗言新法不便第二十二叔亦偕試大人考第一叔父第五策既傳流執政以為橫議將究治其言久之而寢􅍦罷考官直講焦千之顔復數人而已祖父常言吾生平未嘗以私事干人至於陛立奏對惟義理之言故歷事四朝中間雖遷謫不愧于觀過矣祖父知滄州陛辭上曰卿又當逺守如卿宜在朝廷朕知卿久矣每欲用卿輒為事奪豈非命耶祖父曰非敢言命乃臣愚戅自取上曰如卿直道久而自明因語及偏親留京師未能偕行上曰卿母誰氏具以對上曰是仁宗天聖間侍從耶祖父曰臣外祖天聖間以直昭文館知廣州罷還不市南物輦俸餘見緡過嶺仁宗聞之即日擢知制誥上曰清莭過于馬援矣宜其有賢女也故謝表云憫臣之數竒多難時軫淵衷謂臣以直道自明屢形天語初陳龍圗為館職十數年不遷居喪時士大夫有致賻者公不拒服除知廣州罷官不市南物既輦俸餘過嶺半以償贈賻者半以班宗族之貧者故上有馬援之語祖父拜尚書左丞是時韓師朴同知樞密院許沖元為右丞皆先入舊制左右丞同知樞密院以除授先後為立班之次詔祖父立班在韓上許在韓下可見宣仁哲廟眷注之意踰年遂拜右僕射會牽復前侍御史賈易知蘇州爭不決至論于上前祖父曰易與臣本無雅故以其為御史不避權要號為敢言又法應牽復既已為監司矣乃除蘇州則是雖更赦反下遷兼其餘當牽復者甚衆使人人如易則赦令為虛文矣衆欲加易以館職祖父亦為不可有旨再議而御史楊畏來之邵以為稽留詔命又言知杭州待制林希禮部侍郎張巘閻木自太學博士遷太常博士鄒浩自許州教授遷太學博士以為交結子弟祖父聞之即日歸私第稱疾辭位二府諸公相過蘇黃門云莫須翌日見上少敘陳然後求罷貴全進退之禮祖父言宰相一有人言乃是物議不允豈有解紛之理三上不允陛對再上一札力辭老病乃罷為觀文殿大學士集禧觀使國史本傳言與同列議事不合鋭然求退云云然所言數人者皆名賢觀過知仁可以無愧矣泰陵既親政畏等首論二蘇不遺餘力相繼南遷權輿於楊氏也祖父執政時諸公奏對惟白宣仁哲宗有言或無對者祖父奏事宣仁必再稟哲宗有宣諭必告諸公以聽聖語哲宗蓋默識之罷相後哲宗親政張商英為御史常論列元祐執政至祖父上曰蘇某知君臣之禮與他人不同祖父在元祐間不取諸公太紛紛常云君長誰任其咎耶祖父自元豐中滄州被召修官制陛對日上曰自北虜通好八十餘年故事式儀遺散者多每使人來生事無以折正朕欲裒集國朝以來至昨代州定地界文字以類編次為書使後得以稽據非卿不可然此書浩繁卿自度幾歲可成祖父曰臣願盡力二年上曰二年了得甚善因令置局於樞密後廳仍辟官檢閲文字如期書成親筆賜名華戎魯衛信録至奏篇上上讀序引大稱賞曰正類序卦之文書成使官屬王汝翼同上殿捧書進呈上自令一內侍捧之同入禁中留書御榻王汝翼面賜六品服皆非故事蓋舊制書成進呈訖下殿至閣門方進入而神宗未嘗輕賜豫也元豐五年為北虜賀正館伴使虜使鄭顓明辨有才智上命副使張山甫喻以近命蘇某修信録欲重兩朝盟好之固顓感激稱謝見祖父益恭遜私覿禮物皆異常時上遣使喻旨曰聞虜使以卿儒學醖藉贈遺特殊今以小龍茶琉璃器賜卿可豫之以答其意顓復遺異錦一端即日進之後因奏事語及上曰禁中所無也祖父元祐中被召重修渾儀置局辟屬于印經院以吏部令史韓公亷為管勾製造公亷天性機巧知天文曆算製器尚象無不精巧與祖父意合及成奏之二聖臨觀稱賞紹聖中日官言其非是詔近臣覆視視以其法為密不可改也當是時更張元祐事無復餘藴􅍦渾儀不能改革祖父嘉祐中奏詔同修本草圗經時掌禹錫大卿為官長博而寡要昧于才識筆削定著皆出祖父之手祖父知滄州神宗方修官制一新政典祖父被召同詳定每有所擬令樞密承旨張成一就第訪問無不嘆美而從之文潞公常謂祖父今之魏相也所謂好觀漢律令便宜章奏可以斷國論矣王欽若定天書制度禮儀蔚縟時議譏之初天書未之降也真宗訪其事於宰相王文正文正曰聖人以神道設教亦所以行權也上意遂定或以文正為將順議者以謂自太祖革命雖規模宏逺而日不暇給太祖功成治定而河東猶拒命車書未一真宗之初北虜有澶淵之役人心未寧或假天命以鎮拊之所謂神道設教非志於將順也祖父權知審刑院時知金州張仲宣坐枉法贓罪至死法官援李希輔例貸死杖脊黥隸海島祖父奏曰希輔仲宣均為枉法而情有輕重上諤然曰枉法豈復有輕重先祖曰希輔知台州受賕數百千額外度僧仲宣則以所部金坑發檄巡檢躰究無甚利土人憚興作遂以金八兩求仲宣不差官比較止係違令可比恐喝條耳故於枉法為輕上曰免決黥之如何祖父曰士大夫有罪可殺則殺之古者刑不上大夫今仲宣官五品有罪得乘車今貸其死而黥之使與徒隸為伍所重者汚辱衣冠顧其人無足矜上笑曰惡傷其類君子之用心也免決與黥流嶺外自是為例有三免之恩祖父元祐中為吏部尚書時宰執陳乞恩例居在部之上裁造院闕當用知州人時有以本資投狀者而執政子以初任監兼當得之祖父具陳超踰太過孤寒被抑太甚乞為定制超除不得過三等從之遂為定令既而祖父執政久不用恩例踰年伯父以通判射布庫叔父以幕職官射􅉸州推官而已祖父元祐二年四月除尚書右丞吕司空奏方有族人訴昭穆事在省遂改命王正仲五年三月方左丞八年三月罷右僕射為集禧觀使紹聖中蔡衡州重修𥙿陵實録其敘吳丞相言充在政府數言新法不便又多荐引王安石所斥退之人司馬某吕某晦叔韓某持國蘇某等吳雖為相未久其所施設天下屬望以為賢相一時荐引者皆繼踵為賢輔此事過于張説識拔房太尉張曲江矣方熙寧之初神宗夢以項安莭為相翌日追班簿及吏部名籍閲視無有也既又稽考太學士人姓名亦無之久之吳相寖被知遇常以疾在告既出上偶問以疾狀吳對頸項間有贅瘤近疾作甚不能轉側上亦悟昔日之夢眷注日隆遂冠台席豈偶然耶惜乎其嗇于命也時又方之楊綰云

front:
  text: 丞相魏公譚訓􅃃第三
  hash: sha256:1f80e02a09700339f1fabc2dbd2751c3495f7e7712486b7ef503c946a5cda708
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0027_SBCK_003-1a}
body:
  text: 家學家訓行己王禹玉元厚之諸公常問祖父曰公記問之博以至􅀦朝典故本末無遺日月不差用何術也某軰亦常留心扵此記得年忘􅁍月記得月忘却年前後差互本末舛午終不如公願聞其説祖父曰某有一􅀃某每以一􅀊中大事為目欲究當年事則不忘矣如某年改元其年有某事某年上即位其年有某事某年立后􅀂太子其年有某事某年命相其年有某事則記事之一法也史記太史公書是􅀊孔子生是􅀊孔子卒是􅀊齊公㑹扵葵邱是􅀊晋文公始覇之􅀋恐亦此意也元曰不然至扵暗記經史黙咏詩什以至士大天家世閥閱名諱婚姻無遺忘者又以何法乃真強記也前􅀁言者特謙耳祖父常云趨時如鷙猛獸之􅅮務學亦湏如此􅀁以云時哉不可失也祖父喜王元之詩以謂平易而淳深有古風􅁙曽祖時陸農師以門生有挽章曰貳卿頭已白兒慕不勝悲祖父曰此効王元之體元之詩云侍郎三十八羞死老馮唐王語自然而陸未淳熟也祖父年七十餘尤梦先太師訓誨之嚴㦯驚懼而􅁴盖心之思慕雖梦寐終老未常忘也曽祖慶曆中在翰院丁福􅀦公􅁨星奔赴景陵䕶柩由湖北渉京畿厯京東西過淮浙水陸数千里方至閩境数冒險難故曾祖謂祖父曰吾歸􅁙失計汝􅒰慎勿効既不能免仕官隨䖏􅁙我乃延陵季子之志也故曽祖河陽下世祖父扶䕶南来謀􅁙偶遇地理僧自真用治命得吉卜扵南徐京峴山之原術者皆言善地真亦為俞康直大夫􅁙其先人真謂祖父云公家位一品而清貧謂俞氏仕不過四五品而饒給後皆如其言又謂祖父曰葬後三十年西南有楼閣聞皷角聲運河水入明堂公家其興乎如期陳暘叔丞相以鎮江莭度帥􅀭卜第扵青陽門依山建亭榭州亦修青陽城楼每過家上冡郡設皷角於楼上又宅前開溝通城外自此運河水漲則出城外正與坟相望祖父􅆦翔侍從之乆後遂得執政真亦髙僧得山水三昧竒中甚多祖父常云雋永乃猪􅁏其味永可雋故蒯通著書取以為名曾祖始四􅀊讀尚書四日而終秩事見李邯郸誌文祖父幼時與原甫兄弟聚學劉父立之與曽祖同為府推官而原甫頗熟荘子祖父初未之讀也每以三皷衆散後閲之十餘日已能通逹辨折矣祖父别試南廟歐公為考官策題問周禮名数祖父居第一及謝公曰此䇿非盡記周禮疏不能如君之善對也祖父曰某少留心意記誦誠如公言祖父試館職興王賞諫臣賦吹邠迎寒詩胡武平為考官見之曰近􅀊唯馮當世與公在三上賦對盡興王賞諫臣事皆切中如吹邠迎寒詩盡該一部周禮矣王深父謂祖父公於書無不通然字學今幾熄可作續方言神宗元豐五年廷試進士有暨陶者諸公唱名呼曰洎乆之不應上頋祖父曰恐當呼訖吴有暨艶造營府之論恐其後上命以訖呼果出應問陶鄉里乃崇安人上頋左右曰果吴人也神宗問祖父卿家必有異書何故父子皆以博學知名祖父對曰臣家傳朴學惟知記誦而已上曰此尤難也祖父云吾􅀵書数萬􅃃自小官時得之甚艱又皆親校手題使門閲不墜則此文當益廣不然耗散可待可不戒哉祖父年十􅀊侍曽祖入都㦯荐辭學進􅃃投贄皆祖父指示装冩祖父口放六經􅀁行尤有迹焉若夫子之循環反復則不見其迹吾終躬庻幾焉祖父言年十六􅀊侍曽祖為揚州通判命作夏正建寅賦賦成曽祖曰夏正建寅無遺事矣汝異時當以博學知名也祖父常言㓜時與華直温會課無錫日有定規間㦯親知晏㳺日不能逮􅁇之以夜㦯至達旦華時年以長祖父尚㓜賦題皆取平易者同課祖父與華簡盡不遺寸幅及為開封府尹悉軸以見歸且以死求銘為托後終殿中丞遂踐言焉祖父言㓜時在無錫與華直温閔從先山甫二叔相處在洪州則李㤗伯曼君特先生二蔡賢良及居京師又得黄聱隅王深父子直劉原父貢父吕縉叔曽公孚先生相與切磋􅅣磨日有􅀁資至於學成乃知取友之益不可忽也黄名晞祖父平生莭儉尤爱惜楮墨未嘗妄費寸􅁓每剪碎􅁓為簽頭稍大者抄故事令子孫軰冩錄常云此陶侃竹頭木屑之意也常見僧洪禧拾􅁓然帋燭大喜以謂􅀂貨殖必致富祖父平生喜用雌黄墨塗字以為乆之與􅁓同色祖父常云吾仕宦於外不能守父母遺體坟客乃代我守先茔者汝軰當待之如骨􅁏也家素貧止有数畝之田遂盡給㸔坟者再三戒之使尔軰世世享用而不可貨易也衆皆鼓舞听命焉祖父與叔祖同赴廷試髙祖與祖父叔祖書曰昨􅀚程丈甚好泉南止欠状元與宰相汝果能全之乎乃夐古之美事也祖父常以左手指紋輪六十甲子記􅀊時事寔典故無不偹盡如第二指下第一莭為甲子苐三莭為乙夘第三莭指下第一莭為癸丑之􅀋祖父戒小兒手不持錢不惟防誤嚥亦恐壊其志行祖父常云孟子較兼金百鎰五十鎰受與不受杜子美詩云至尊含咲催賜金圉人太僕皆惆悵為太屑也祖父年十六省試斗為天之喉舌賦文肅主文見曽祖曰賢郎已髙中而􅀧檢試􅃃者以聲聞去為聞平為不合格遂黜祖父自是始切意字學發明為多一日坐書室中吴春卿為知制誥来訪曾祖曽祖出徑来訪祖父驟然論文遽問唐人制誥孰為􅄖者祖父辭不敢對吴曰相與論文何必形迹祖父遂言世称常楊元白以某􅀚之常不及楊白不及元吴大称賞曰足下舉子而能如此異時必典制命矣韓子華出守忘其處禁從館閣皆祖餞焉坐有言芸閣何出而坐間諸鉅公皆不記祖父曰見初學記盖諸公忽而不讀尔祖父善談易晚尤嗜荘子常云大衍之数五十其用四十有九虚一不用􅀁謂妙道百姓日用而不知者也又常􅀚歩屈曲䖝指之曰此其行之者一也祖父與吕縉叔王深甫子直諸公改正元和姓纂以朱勾細字簽頭證定甚竒又改水經尤得其全比世本増多皆蔵扵象先可以為寳也舒信道元豐中為御史中丞銳扵進取言事多渉刻薄為王和甫􅀁䋲除名紹聖中復通直郎知無為軍㦯言其罪深不當叙復改監中嶽廟祖父聞之曰士大夫立朝當言路一渉非義失人心則終躬遂廢如王君貺未三十為御史中丞縁進奏院事終躬轗軻不復大用䧟扵􅈓薄可不慎哉此􅃽仲逺記之甚詳祖父十􅀊時􅍦從曽祖入都調官諸公往還者皆一時名士見祖父皆異目時盛仲模學士面試省題詩立成甚見称賞期以逺到祖父常􅀃􅂖城􅀦門有一石人刋其腹曰磨兠鞬慎勿言劉洎少時常遇異人教之曰君當佐太平然宜慎磨兠之戒逮京口新第成大􅆹照壁用楮餬大書家語周廟三緘背銘之文深戒子孫以慎言亦此意也自後賢士大夫皆嘆服以謂家法之􅃊曽祖常謂門第髙華者可畏不可恃二事皆出於桞氏訓序祖父仰瞻星宿􅆞度常于小子首背上提之使知星命謂子孫曰懸象昭然如此汝不䖍奉乃欲求之杳㝠乎祖父常云禽獸知母而不知父野人曰父母何擇焉學士大夫則知尊祖矣祖父常以米宣献澄心堂􅁓手書較正大唐郊祀錄十􅃃四䇿賜象先皆朱書臣某足為寳玩祖父待試時曽祖居西崗相逺十餘里每有家務必召祖父咨决常徒歩往来日㦯至数返未常廢亦不為勞祖父常爱徐勉戒子嵩書云少時不欲興立邸第貨殖聚歛中年聊于東山開營小園非存種藝以要利也政􅁒穿池種樹以􅀉情賞又以郊際閒曠終可為宅儻㦯懸車致仕寔欲歌笑扵斯凡此一篇皆暗合吾意京口建第之日令子孫皆錄一本志之曽祖常言某得吾之學衮二叔祖得吾之文梲三叔祖得吾之講􅀃也祖父取平日抄莭分門􅀋令子孫軰傳冩幾二百册古今􅀋書莫及焉常云門􅀋最難撰名祖父在舘閣九年家貧俸薄不暇募傭書傳寫秘閣書籍每日記二千言歸即書於方册家中藏書数萬􅃃秘閣􅀁傳者居多祖父自維􅀭拜中太一宫使歸鄊里是時葉公梦得為丹徒縣尉頗許其假借傳冩業公每對士大夫言親炙之幸其􅀁傳寫遂為葉氏蔵書之祖云

front:
  text: 丞相魏公談訓卷第六
  hash: sha256:135c5d830e7c04958bc8a58088325279317cadf1fd674b791abada00757b7419
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0027_SBCK_006-1a}
body:
  text: 親族外姻師友知人曽祖丁髙祖憂自翰苑奔喪復州歸葬于閩閩之士大夫皆逺迓福建監司命士子相率數千人迓於衢婺時章衡子平亦在遣中曽祖一見許以科甲名譽但不言名位所至祖父元豐六年自吏部侍郎丁曽祖母憂歸潤象先侍行道士王從之來言䖍州陽孝本行先賫數百千買書京師今將歸書甚富非臣舟不可載象先許諾既見欣然如舊交行至宿州始白祖父一見大喜曰汝得此賢者為師友如吾得聱隅矣及至揚寓居江都陽亦館于家几二年日與之講習祖父間亦與談易莊老陽欣然自謂有得及還朝送至泗上復留揚州謀舟以歸明年祖父為吏部尚書象先贊曰以德行純固可為師表科薦之蒲傳正書來云公荐陽行先人皆嘆服某當繼之遂亦荐之蓋行先舊館于傳正家訓其二子甚嚴其後䖍州江西皆屢荐至大觀𥘉遂以八行為國子録遷博士乞致仕以直祕閣提點成都府玉局觀以歸大顯名于時陽平生不娶多蔬食故東坡贈詩比之陽道州元德秀云祖父晚年德業彌劭一時諸公皆宗仲焉李公擇宜彥祖趙無愧年齒不甚相逺同朝同省而皆父事焉吕吉甫為參政日使其親友謂祖父曰祖父字吾鄊里文人行若從吾言執政可得也祖父笑而不答陳龍圖賀祖父以大理寺丞知廣德縣曰五六人荐舉受恩如受敵不可忽也又云吾鄊地薄難得福人丈人心愈下氣愈低臨深履薄以度年又曰若圗試不得不如圗邑南來年才三十有二惟恐官職太早但以文人為則又何憂乎黃聱隅獻所為文於曾祖曽祖深器重之遂館之書室令祖父與之遊從常謂聱隅曰成子名者韓稚圭也子冝贄文見之聱隅如言韓果欽重其後荐之于朝命之以官皆公力也聱隅名晞字景微著書號聱隅子祖父知頴州王深甫居鄉里每以使君學士為稱不以字稱呼及罷郡乃講平生之好祖父在郡每以旦日升堂拜其母鄊人風化焉杜相在南都尤待遇祖父每一月不往必曰祖父字𣣔為不可得而親疏耶何待老夫之薄也是時歐公為尹每燕㑹止是兩客祁公與祖父也蔡元導元翰賢良自撫至洪謁見曽祖曽祖甚相器重留館于書室使與祖父同學執子姪之禮甚恭情義尤渥每有縫紉浣濯必祝老閽曰煩持此以呈娘子為修治之其後戒子景繁以父事祖父景繁復戒寬夫事大人諸父而以兄稱象先輩曾祖宰無錫圭田八百碩皆儲于外賔客饋送周急恤族宴集之費盡之客至如歸焉陳龍閣知廣州贈祖父詩曰婦翁清白傳兒女莫把珠璣綴綺羅人謂公必不以珠玉為贈也陳公既以任子恩奏其姪仍贈以詩曰門前桃李已成隂更有荆枝與竹林比並勢豪雖不足遭逢恩澤亦難任江山在望皆吾土晨夕供甘有俸金十載相從應學得怕人知事莫萌心人謂公之􅍾行斷章見之髙祖知邵州苦刑獄之繁州牌邵字從刀從口乃改從召囹圄大省祖父為郡幕杜祁公以故相居于家祖父每造請相與如骨月期于異日及召試館職祖父請居中都所宜公曰吾弟年少有盛名當致通顯不可使當路指為門人某在京局未嘗見執政貴人惟參辭謝賀乃一往故人無得而疏親終躬無党附之名祖父敬佩其言終躬行之祖父將罷南都幕趙康靖公孫文簡公暨翰苑諸公連章荐文繼先世宜在朝廷遂召試館職歐公常為尹又省試主文以其未常致力頗有不足色乃曰大凡相知未必相成相成不必相知某少為西京幕事三相𥘉錢思公相待如昆弟不復以職事責及其罷也未常荐京秩其次王曾稍加程督而一荐後王曙寡言嚴毅不可犯每以職事詰責方欲引疾避之王亦還朝乃延譽于中都首荐入館故知相知未必相成相成不必相知也祖父少受知杜祁公公為相不及百日而經宗祀冠貂蟬數有大儀制皆預後以東宫少師致仕年八十而薨祖父在相位不及一年亦預䇿后郊禮以宫師致政薨年八十有二與公出處始終略同祖父少與王深甫兄弟遊從王外祖乃曾魯公太夫人之父祖父每升堂拜焉時置酒設茗果蜜薑甚竒祖父食之既曽夫人乃數起自取增之見祖父至必大喜曽魯公少時第五人及第常坐纍左遷曽祖為禁從力為湔洗于諸公間寖至大用後張安道見祖父每言曽豈可忘先公恩德乎凌公景陽祖母兖國夫人之父初為興化軍仙遊縣尉一日驗覆于村墅有一道士挾二童子來觀眉目疏秀精神爽拔公問誰道士言蔡耆長之子問讀書乎曰未也乃君謨與其弟髙爾及歸戒道士諭其家令至邑躬自教以經子日進不已如夙學者踰年幾成及罷秩挈至軍中屬守置之學督課之及公歸京久之為三司勾當公事稅居西岡尼寺前一日老閽告云有興化軍二舉子欲見公日晡歸矣如是三日公不省何人久之悟曰必二蔡生也乃使家人具飯俾閽者留以待及歸見之果君謨兄弟問其學業已富矣來從都中舉公為之經營就試及試寢不踰廟賦畢君謨録以呈公時晏元獻為三司使凌公以蔡賦呈之元獻甚喜曰髙解不出二十名又十日前所示賦甚佳必不出十人及榜將出晏公曰蔡襄賦必第一人今歲名名所作世人皆見之無踰襄者榜出果第一遂致通顯凌公力也凌以妻弟之女葛氏妻焉及為諫官㦯言凌公與富人孫固結姻罷省判知漳州衆論以蔡不為凌辨為不直孫和甫後致位樞長及以祖母歸于我家皆以凌公為知人曽祖為三司判官夏相為使一歲才一開晏女樂侍姬管絃器皿窮極奢僣後晏公代使每休沐約同寮置酒案上不過數器久之漸進盈几乃草具歌舞倦則曰此輩伎倆已盡吾輩亦可呈事藝設硯墨𥿄札各賦詩述懷以為樂未嘗一日虛廢夏晏賢否于此分矣劉元甫少時一僧善傳神見曾祖曾祖召元甫使僧為之傳神劉時未登第僧問所服劉曰但直綴皂縚可也逡巡畫成逼真劉即以歌詩謝之頃刻而成曽祖大賞之曰可謂三絶曾祖為洪州通判黃庠為省元以病歸仁宗展御試待庠為第一竟不能赴會曽祖往見之乃為啓事以謝其略云失邯鄲之步既已徒歸復鴈門之騎若為未效又云車騎雍容親都亭之謁管絃昏夜兼容便坐之趨黃既歸自以名重不復行卷但作封狀謁守倅人謂志滿必非逺器竟以疾不起不霑一第曽祖平生與李獻臣張安道梁相適孫樞沔厚善至𬒳誣以朋党國史謂時號草頭木腳祖父辨其事後削去之竇卞之先人為無錫尉曽祖為宰竇未有子常得異夢曽祖為診其夢曰必生貴子當以殊科位通顯已而生卞後果以第三人登第終天章閣待制林次中娶第十一祖姑善能文熙寧中次中為御史事有所忤㦯曰諸蘇教之有人云何必諸蘇家中自有文士祖父少時鄰居皇甫郎中來謁祖父將往謝之曽祖曰汝見前輩必有襴鞹封狀在前􅒰必行書封狀已為簡矣黃聱隅遊京師章得象為相以鄊里召置門下黃一日邂逅見祖父如舊識久之語曰某居鄊人之館其間雜以駔儈令人欎欎祖父曰能移就敝廬乎黃大喜白曽祖曽祖曰汝􅒰奪時相之客豈得不防禍耶祖父曰此自其志也遂來謁曽祖大愛重之遂遷居講學頗恨相見之晚一日舅祖陳孟陽見祖父云知聱隅館于公家可喜也然前日汴上遇之不敢揖昨在鄊里與人相遇于漢上逡巡顧揖鞠躬反走幾墜水中汴流逡巡急不同尋常故不揖也蓋黃力恭謹如此黃性好奕二叔祖亦善奕每相見晨起欲出留之曰有急幹即舉指曰一局如何曰可矣淹留早膳㦯至抵暮不已叔祖問急幹如何黃絶倒乃知賢者亦有所蔽也黃酷好左氏得丘明所書筮易之法王則叛建章得象筮之曰百日必尅已而果然常夢丘明曰吾後世啓在棣州子能訪之乎後果往尋訪得之與之周旋及黃老有一子不克肖似諸公將特起之黃不願仕但𣣔得七品官以䕃其子孫諸公以問祖父祖父以實告遂除國子四門助教致仕祖父為大理丞館閣校勘月俸共十七千賃宅飬馬已費三之一迎侍髙曽祖母二曽叔祖二曽祖姑二叔祖三叔姑皆未昏嫁食指既衆親賔益多太夫人治家每儉約條理之故居京九年上下無不足之色祖父與王岐公同年王每相訪祖父必拜之王逡巡引避時以為得躰歐公上胥內翰啓時猶未冠胥閲書甚竒之及進見益以為異乃語人曰始見其書謂已讀萬卷及見其人才涉獵爾此尤難得異時必有大名于世故以女妻之公少時有一僧相之曰君耳過面當得天下重名然唇不著齒亦多招公謗鎖廳試周以宗強沈文通為考官祖父拆號文通不及束帶迎問外傳好賦乎祖父曰人傳張挺卿沈曰云何祖父遂舉文子文孫代有金城之固卜年卜世勢增磐石之強沈撧耳頓足曰不見此賦必有說也及取真卷乃文通不思一張之語大抹之遂黜祖父為殿試考官張斯立挺卿五祖姑之壻也名在丙科既而乘醉大悖以謂祖父避嫌故抑之下科祖父不與之較後應制舉一夕暴卒人以為心絶張安道雅不喜石介以謂狂譎盜名所以與歐范不足至目以奸邪一日謁曽祖在祖父書室中案上見介書曰吾弟何為與此狂遊又問黃叔微何在問前日狂生以羔鴈聘之不受何不與吃了羊著了絹一任作怪何足與之較辭受義理也曽祖除御史中丞固辭不拜石介以書與祖父以不拜命為非其略曰內相為名臣祖父字為賢子天下屬望所繫非輕豈可以辭位為亷𥘉曽祖中司之命懇辭不拜是時曽子固亦以書勸受命比書至已得謮矣蓋是時髙祖知復州年老多病故曽祖不敢當言職也曽叔祖寺丞繹髙尚不仕居復州博學能文惟喜黃白之術然生平不遇其人竟無所得忽一日有道士來謁談鉛汞甚竒且命置水銀十餘兩設大鑊然薪翌日發視粲然銀也叔父神異之許傳其術道士忽暴中眩瞀卒貨其金辦棺斂葬處裁足用叔祖曰無妄之財不可兾無益之事不必作意者天以此警戒吾也終躬不復言黃白之事曽叔祖太尉緘進士登第文學知名少豪邁磊落不羣儂賊作亂自祕書丞换右列為廣東路分都監屢有戰功再黜再起後以皇城使知雍州蠻賊攻城拒守甚力叔祖子元調桂州司户將挈其孥犯圍以往曽叔祖曰汝若挈族而出人心易搖必敗吾事單馬而行可也拒守計窮百日城破先開一坎手刃妻子男女孫婢妾三十六人然後自裁事聞神宗為之流涕輟朝祖父知杭州陛辭上首及其事祖父謝恩典之異神宗愴然曰朝廷自當褒崇以勸忠義初叔祖過潤祭奠曽祖墓次題詩曰五里平郊烟靄村淚流墳土泣英魂近年忠義心如鐵不負平生教育恩

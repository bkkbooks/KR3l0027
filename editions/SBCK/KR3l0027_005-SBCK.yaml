front:
  text: 丞相魏公譚訓􅃃第五
  hash: sha256:be7de42ef23cccf9e8f81a6d94063bccb2015c7624fe11229b0f3e93f5c91718
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0027_SBCK_005-1a}
body:
  text: 前言政事孔道輔為御史中丞勘馮士元事盡法不阿仁宗称之有意大用時大臣與士元通奸私者程􅂙預琳道輔既得其情矣而退傳張鄧公不喜道輔張曰公􅀁以致此者誰之力也非程公不致此道輔悵然愧而徳之不数日上殿遂力救觧上大怒貶程亦黜道輔道輔既為張􅀁賣感憤得疾死中路祖父常為東坡言載之志林韓大􅂙忠獻之第八子司門郎中諱嘉祐中知穎州時京西大疫流殍甚衆公賑濟有方郡人頼以全活者多乃揭榜鄰境諭以救䘏之意使来就食鄰郡之民襁負而至来者旣衆􅂖食不足又聚衆稍多無寛廣之居㦯感疫癘飢病相仍死者頗衆韓公亦感疾而亡其秋鄰郡士人梦召至隂府􅀅使治韓司門賑濟獄士人乞假治後事及􅁴得疾旬日卒祖父言賑濟雖為政之急務當量力為之不必廣其聲廣其聲而寔不至則至者反罹􅁶徙飢疫之患是速其死􅀁以有隂禍杜正獻為相蔡君謨孫之翰為諫官屡乞出仁宗云卿等審欲缺一字郡當具􅀁欲奏来於是蔡除福州孫除安州正献云諫官無故出終非美事乞且依舊上可之退書聖語陳恭公為􅂙政不肯書曰吾初不聞正献惧焚之由此遂罷相議者謂正献當俟明日覆奏不當遽㷊其書正献云始在西府時上每訪以中書事及為相雖中書事不以訪公因言君臣之間能全始終者為難也祖父常以語東坡載之志林曽祖丁􅁨居江寕朝廷除知江寕縣江寕六朝建􅀦又李氏故都户口繁夥民俗嚚訴號為難治祖父未至徧訪老扵為吏者如曽伯祖判官與祖姑之夫楊殿臣皆曰抑强扶弱興􅆡舉敝民之豪縱者不可恕柔謹者必深與之僧道牙儈胥吏有罪皆不可赦祖父初佩服其言久之惟念強弱無状何從知之頋理如何何扶抑之有豪縱者㦯有理何可不受柔謹者犯令何可不治且不可以貌取僧道偶渉扵事當以曲折為㫁至於牙儈胥吏與豪縱之􅀃雖同其言未可為盡也當思理之􅀁在而已詞状日千􅁓祖父謂邑民曰令一耳目不採人言􅀂察多未能遽察吾聞汝􅒰每投状州縣即泊扵店肆主人利於汝数至乆泊必巧言留汝汝今投牒宜即歸休勿留俟吾審覈可否可行即命耆保召汝不可即懸榜於門告汝汝以爲不然即之府㦯監司訴可也唯鬪毆傷犯者先治之百姓乃去積一月詞状幾萬餘􅁓乃以暇日缺三字十事可行者無一二廼分置之昏田者置扵甲争辨者置於乙分財者置於丙丐公㩀文移者置於丁於是出引使􅂄保約日呼两詞皆来爲之區㫁缺一字不十日而畢其不可行者皆榜喻之自尔積􅆡詞訴皆盡日惟詞牒数十而已民大驩悦楊告爲守老於爲吏以循能称大歎服焉每開晏㑹客即曰江寕無事可從讌集也祖父在江寕有出役老胥喜訴州縣借詞撓法上下畏之祖父始至請給告捕塩賞未與恃醉而悖祖父曰此頑民不可不治也榜之数十日莭其飲食困而後痛笞之胥再拜曰某知畏矣自尔不入公門矣出曰我為吏数十年出役亦十年前後犯法被杖数十無如今曰遭此少年縣宰吾知過矣自是改莭為善不入公門家至鉅萬卒為良民每為人言吾晚得端居温飽蘇宰之賜也祖父自江寕有訴民田者縣以為不直笞之乃詣州暨憲􅒩每笞焉祖父初至復下縣理之祖父即為剖析其不可者之理詳喻之其人大驚曰聞如是之言方知前非矣陳龍閣世称循吏知䖍州遭􅀊荒有刼禾者千餘人龍閣平反奏讞悉從末减􅀊大稔流民歸業公有詩曰春来活得千人命秋後還􅀵数倍禾莫道使君無善政從教吹作竹枝歌乃州人美公之詞祖父知杭州執政曰本朝不以從官守杭者惟張􅆾崖今公亦以秘監往雖寵命未􅄖而借重可見况乖崖之日􅀊荒民飢正與今同治荒之政諉公非不厚矣祖父既至平易不􅅰唯民􅀁利悉因之􅀁以賑濟拊䘏之偹至民遂安堵至今言及蘇公即以手加額其後奏對神宗語及杭事上曰錢唐之政民至今歌詠祖父知亳州有豪民婦被罪當杖以病未科决每旬檢校未愈鄧元孚爲譙縣簿謂大人曰尊公髙明平昔以政事称今豈可爲一豪婦人􅀁紿公爲賢子不可不白但諭醫者如法檢校彼自不誣矣大人白之祖父曰萬事付公議何容心焉若言語輕重則人有􅀚望㦯可有悔既而婦死元孚大慙服曰某􅒰狭小豈可測公之用心也祖父為南京推官歐陽文忠公留守府事悉以見委祖父每辭避之公不以為然告杜祁公曰蘇推不肯任府事似同形迹祁公曰不然蘇識致髙逺為幕官上有倅簽􅀂專府事􅀅有議者尔文忠公益嘆重祖父尹開封頗嚴鞭扑以謂京師浩穣湏弹壓當以柱後惠文治之非亳頴卧治之比方試進士有博於肆楼者廵捕擒以来祖父問擲彩何為曰選官尔何許曰房中祖父曰舉人房中賭彩選市巡何預痛杖之内外􅌚惬祖父為南都幕歐公為留守日每監司至吏􅈽案求署者祖父曰吾豈與尔同尔豈湏監司至後来署欺監司者乎平時稽留文牘豈得監司来然後求署得監司懲艾戒之甚善每監司至出城五里迓之事事有定式及歐公守亳祖父為淮南轉運使廵按至郡公逺出迎迓礼意􅂭重其相待如南都待監司者祖父以門生礼致恭公揖譲甚久乃連轡而行􅀚者如堵至郡益加礼曰修老病廢事官吏􅗦法恐妨按劾得公懲戒之幸也切勿形迹祖父曰一如南都時惟公案有不得公署字者公為絶倒祖父知婺州前此未有登第者祖父視州學庳陋形模湫隘乃徙之爽塏地建立宏麗是􅀊錢得循􅀤觧登第自尔登科者不絶祖父常􅀃張去華侍郎状元及第文章學問為一時之賢而孝飬之行逺追古人􅍦不逹政事自翰林尹開封事多留􅆡倒錯遂罷常有一人犯夜邏者執之以来公問何為夜行對曰以母病求醫問頗有見証否人皆笑之趙清獻平生留意釋氏常􅂙圎照􅀁至以寛慈為治晚􅀊自鄊里宫祠起知杭州杭人以其鄰􅀖大老又素長者頗喜其来父老出数百里迓之既至治以嚴肅不可忤犯鞭扑無􅀁容貸官吏不少假借杭人大失望不知公意如何㦯曰亦如王肅三返祖父尹京軍廵按陳世儒家群婢殺其􅀁生陳不以聞并其妻李氏皆在大辟李乃吕氏甥親党甚多神宗疑府中寛獄事時􅉝舅化光為中都官有􅀁聞以簡諭大人令白祖父奏對之際宜領上㫖明日上殿上果首及此事云此乃人倫大惡而党附甚衆卿長者恐為衆言􅀁移宜諭􅀁司盡情推鞠祖父對曰此天下􅀁惡但虚寔未明臣每諭勘官但盡鞫寔不可出入人罪而已其後人言祖父與吕晦叔善疑吕常請求及置對御史卒無一事掛吏議者

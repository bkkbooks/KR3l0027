front:
  text: 丞相魏公談訓卷第三
  hash: sha256:faa715793f2c87c59f82898e684a8da6ca228f119eab5a3430cb407b9812f7b7
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0027_SBCK_003-1a}
body:
  text: 家學家訓行己王禹玉元厚之諸公常問祖父曰公記問之博以至國朝典故本末無遺日月不差用何術也某輩亦常留心于此記得年忘却月記得月忘却年前後差互本末舛午終不如公願聞其說祖父曰某有一說某每以一歲中大事為目欲究當年事則不忘矣如某年改元其年有某事某年上即位其年有某事某年立后若太子其年有某事某年命相其年有某事則記事之一法也史記太史公書是歲孔子生是歲孔子卒是歲齊公㑹于葵邱是歲晋文公始霸之類恐亦此意也元曰不然至于暗記經史默咏詩什以至士大天家世閥閲名諱婚姻無遺忘者又以何法乃真強記也前所言者特謙耳祖父常云趨時如鷙猛獸之搏務學亦須如此所以云時哉不可失也祖父喜王元之詩以謂平易而淳深有古風葬曽祖時陸農師以門生有挽章曰二卿頭已白兒慕不勝悲祖父曰此效王元之體元之詩云侍郎三十八羞死老馮唐王語自然而陸未淳熟也祖父年七十餘尤夢先太師訓誨之嚴㦯驚懼而覺蓋心之思慕雖夢寐終老未常忘也曽祖慶曆中在翰院丁福國公憂星奔赴景陵護柩由湖北涉京畿厯京東西過淮浙水陸數千里方至閩境數冒險難故曾祖謂祖父曰吾歸葬失計汝􅒰慎勿效既不能免仕官隨處葬我乃延陵季子之志也故曽祖河陽下世祖父扶護南來謀葬偶遇地理僧自真用治命得吉卜于南徐京峴山之原術者皆言善地真亦為俞康直大夫葬其先人真謂祖父云公家位一品而清貧謂俞氏仕不過四五品而饒給後皆如其言又謂祖父曰葬後三十年西南有樓閣聞鼓角聲運河水入明堂公家其興乎如期陳暘叔丞相以鎮江莭度帥揚卜第于青陽門依山建亭榭州亦修青陽城樓每過家上冡郡設鼓角於樓上又宅前開溝通城外自此運河水漲則出城外正與墳相望祖父徊翔侍從之久後遂得執政真亦髙僧得山水三昧竒中甚多祖父常云雋永乃猪肉其味永可雋故蒯通著書取以為名曾祖始四歲讀尚書四日而終秩事見李邯鄲志文祖父幼時與原甫兄弟聚學劉父立之與曽祖同為府推官而原甫頗熟莊子祖父初未之讀也每以三鼓衆散後閲之十餘日已能通逹辨折矣祖父别試南廟歐公為考官策題問周禮名數祖父居第一及謝公曰此䇿非盡記周禮疏不能如君之善對也祖父曰某少留心意記誦誠如公言祖父試館職興王賞諫臣賦吹邠迎寒詩胡武平為考官見之曰近歲唯馮當世與公在三上賦對盡興王賞諫臣事皆切中如吹邠迎寒詩盡該一部周禮矣王深父謂祖父公於書無不通然字學今幾熄可作續方言神宗元豐五年廷試進士有暨陶者諸公唱名呼曰洎久之不應上顧祖父曰恐當呼訖吳有暨艷造營府之論恐其後上命以訖呼果出應問陶鄉里乃崇安人上顧左右曰果吳人也神宗問祖父卿家必有異書何故父子皆以博學知名祖父對曰臣家傳朴學惟知記誦而已上曰此尤難也祖父云吾收書數萬卷自小官時得之甚艱又皆親校手題使門閲不墜則此文當益廣不然耗散可待可不戒哉祖父年十歲侍曽祖入都㦯荐辭學進卷投贄皆祖父指示裝寫祖父口放六經所行尤有迹焉若夫子之循環反復則不見其迹吾終躬庶幾焉祖父言年十六歲侍曽祖為揚州通判命作夏正建寅賦賦成曽祖曰夏正建寅無遺事矣汝異時當以博學知名也祖父常言幼時與華直溫會課無錫日有定規間㦯親知晏遊日不能逮繼之以夜㦯至達旦華時年以長祖父尚幼賦題皆取平易者同課祖父與華簡盡不遺寸幅及為開封府尹悉軸以見歸且以死求銘為托後終殿中丞遂踐言焉祖父言幼時在無錫與華直溫閔從先山甫二叔相處在洪州則李泰伯曼君特先生二蔡賢良及居京師又得黃聱隅王深父子直劉原父貢父吕縉叔曽公孚先生相與切磋琢磨日有所資至於學成乃知取友之益不可忽也黃名晞祖父平生莭儉尤愛惜楮墨未嘗妄費寸𥿄每剪碎𥿄為簽頭稍大者抄故事令子孫輩寫録常云此陶侃竹頭木屑之意也常見僧洪禧拾𥿄然紙燭大喜以謂若貨殖必致富祖父平生喜用雌黃墨塗字以為久之與𥿄同色祖父常云吾仕宦於外不能守父母遺體墳客乃代我守先塋者汝輩當待之如骨肉也家素貧止有數畝之田遂盡給看墳者再三戒之使爾輩世世享用而不可貨易也衆皆鼓舞聽命焉祖父與叔祖同赴廷試髙祖與祖父叔祖書曰昨觀程丈甚好泉南止缺狀元與宰相汝果能全之乎乃敻古之美事也祖父常以左手指紋輪六十甲子記歲時事實典故無不偹盡如第二指下第一莭為甲子苐三莭為乙卯第三莭指下第一莭為癸丑之類祖父戒小兒手不持錢不惟防誤咽亦恐壞其志行祖父常云孟子較兼金百鎰五十鎰受與不受杜子美詩云至尊含笑催賜金圉人太僕皆惆悵為太屑也祖父年十六省試斗為天之喉舌賦文肅主文見曽祖曰賢郎已髙中而點檢試卷者以聲聞去為聞平為不合格遂黜祖父自是始切意字學發明為多一日坐書室中吳春卿為知制誥來訪曾祖曽祖出徑來訪祖父驟然論文遽問唐人制誥孰為優者祖父辭不敢對吳曰相與論文何必形迹祖父遂言世稱常楊元白以某觀之常不及楊白不及元吳大稱賞曰足下舉子而能如此異時必典制命矣韓子華出守忘其處禁從館閣皆祖餞焉坐有言藝閣何出而坐間諸巨公皆不記祖父曰見初學記蓋諸公忽而不讀爾祖父善談易晚尤嗜莊子常云大衍之數五十其用四十有九虛一不用所謂妙道百姓日用而不知者也又常觀步屈曲蟲指之曰此其行之者一也祖父與吕縉叔王深甫子直諸公改正元和姓纂以朱勾細字簽頭證定甚竒又改水經尤得其全比世本增多皆藏于象先可以為寶也舒信道元豐中為御史中丞鋭于進取言事多涉刻薄為王和甫所繩除名紹聖中復通直郎知無為軍㦯言其罪深不當叙復改監中嶽廟祖父聞之曰士大夫立朝當言路一涉非義失人心則終躬遂廢如王君貺未三十為御史中丞緣進奏院事終躬轗軻不復大用陷于刻薄可不慎哉此蔣仲逺記之甚詳祖父十歲時􅍦從曽祖入都調官諸公往還者皆一時名士見祖父皆異目時盛仲模學士面試省題詩立成甚見稱賞期以逺到祖父常說穀城國門有一石人刋其腹曰磨兜鞬慎勿言劉洎少時常遇異人教之曰君當佐太平然宜慎磨兜之戒逮京口新第成大廳照壁用楮糊大書家語周廟三緘背銘之文深戒子孫以慎言亦此意也自後賢士大夫皆嘆服以謂家法之嚴曽祖常謂門第髙華者可畏不可恃二事皆出於桞氏訓序祖父仰瞻星宿纏度常于小子首背上提之使知星命謂子孫曰懸象昭然如此汝不䖍奉乃欲求之杳冥乎祖父常云禽獸知母而不知父野人曰父母何擇焉學士大夫則知尊祖矣祖父常以米宣獻澄心堂𥿄手書較正大唐郊祀録十卷四䇿賜象先皆朱書臣某足為寶玩祖父待試時曽祖居西岡相逺十餘里每有家務必召祖父咨决常徒步往來日㦯至數返未常廢亦不為勞祖父常愛徐勉戒子嵩書云少時不欲興立邸第貨殖聚斂中年聊于東山開營小園非存種藝以要利也政𣣔穿池種樹以寄情賞又以郊際閒曠終可為宅儻㦯懸車致仕實欲歌笑于斯凡此一篇皆暗合吾意京口建第之日令子孫皆録一本志之曽祖常言某得吾之學衮二叔祖得吾之文梲三叔祖得吾之講說也祖父取平日抄莭分門類令子孫輩傳寫幾二百册古今類書莫及焉常云門類最難撰名祖父在館閣九年家貧俸薄不暇募傭書傳寫祕閣書籍每日記二千言歸即書於方册家中藏書數萬卷祕閣所傳者居多祖父自維揚拜中太一宫使歸鄊里是時葉公夢得為丹徒縣尉頗許其假借傳寫業公每對士大夫言親炙之幸其所傳寫遂為葉氏藏書之祖云

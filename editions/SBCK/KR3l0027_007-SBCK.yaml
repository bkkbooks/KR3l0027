front:
  text: 丞相魏公譚訓卷第七
  hash: sha256:19f047a02ee4d2ee8b8e868e7a2dea1de39c06b04b3043f1f9d299ad542a96ae
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0027_SBCK_007-1a}
body:
  text: 善言鍳裁㳺從薦舉吴丞相與祖父相知特深祖父為開封尹舉孫莘老自代辟劉莘老為府推官後見吴吴曰舉二莘老甚善祖父使虜過北都潞公為尹禮意􅂭異窮冬盛寒必達旦每至夜分即呼工伎逼􅆹奏樂初疑其喧憒不喜􅀁以乆之乃悟近􅆹多籸燭可以附炎欲加䘏而不欲為例特設故也乃知前軰事事有智祖父常云人生在勤勤則不匱戸樞不蠧流水不腐此其理也祖父常言平生未嘗處妻家雖偶然不可為常每常戒子孫勿逺親庭而淹泊妻室也杜和叔沂祁公之子公惟一子以公致政除南都倅使侍親側祖父為留守推官杜荐改官以溢格不用仁宗時選人引見上親視其閥閲一士人舉官二十員上駭訪之乃執政之甥止與循資曰􅀂不沮止寒士何由進故改官而荐章多者皆自削其名其後祖父為右丞相杜以正卿致仕以中散大夫歸元符三年象先調廬簽過宋杜年八十聪明不衰説􅇮時事亹亹不已親至河亭相訪時已四月猶致山藥数秤俾供甘㫖手書作簡如少年茟跡范堯夫宰㐮邑興修公宇宏麗壮􅀚如大郡府不免科買材木瓦甓膠漆之􅀋用民財力為多䋲之以法殆以祖父為府界提􅀧同寮與府官多窺伺之祖父力為保全極口借譽荐之扵朝范感激不已後每有書皆親札前幅書年月称門人祖父既為孫趙二公及諸内相􅀁荐文継先世上問誰人子執政具以對時方患舘職員冗如梅堯臣宋敏修皆同時被舉試入䓁止得出身㦯陞任􅍦祖父奏章上仁宗即令與舘職曽祖常謂祖父二百口之長也迨祖父居潤聚族建第不啻二百口盛文肅来謁曽祖見祖父與叔祖皆㓜稚拊其首曰人丁強壮初髙祖既令曽祖裁啟見盛公時盛知揚州曽祖丁劉夫人􅁨未常出不得已謁見公大喜相與如平交遂留居於維揚闢衙東門仗舍俾居奉几筵其屋至今存焉盛文肅公善􅇨鍳知人之貴賤壽夭盖左氏􅀁書之遺法也在􅀭州有鄭州推官夏有章来謁才雋可爱又善為詩公待之甚厚留連燕飲累日夏感公頋遇臨别獻書以謝而題其封曰圃田從事公一見即擲還不復見夏不知􅀁謂惶駭不能進退懇郡寮覘公意公曰此人必終于圃田從事矣某忝前軰今簡傲如此志已盈滿其能乆乎未幾夏舉舘職㦯言其無行報罷竟以奉寕幕直􅀦子講以卒此與左氏視髙歩逺志不在盟受玉髙卑可樂而哀以卜人之死生存亡利害禍福者何以異也曽祖亦得盛公􅇨鍳人物之理初見富公未許台輔一日早朝天驟雨持盖者不至衣已沾􅊜乆之乃来公不問色亦不變曽祖謂祖公曰人言彦􅀦必為公輔今日􅀚之非妄也曽祖為太常博士韓康公方年少同祀祭致齋太廟一見許以公輔後康公見祖父曰某受知先公最在衆人之前也祖父少時􅀙舅陳孟陽善相謂祖父曰吾甥神采秀㧞風􅇧􅅛竒當為台輔然眉重壓神中年後有喜必有􅁨眉為之灾也陳亦有詩名髙士也老牓有官有集行于世祖父亦得文肅􅇨鍳之法治平中見范堯夫以謂必有名位范罷帥而蹇馬羸僕處之怡然期范必作宰輔元祐八年祖父罷相范再入復拜相宋元獻自安州赴開封試良玉不􅅣賦重疊用名字既悟􅁶南薫門外􅀅治歸装胥偃内翰為舘職主文柄挟􅃃厠上改藴精二字以第一處之及榜􅀅出使其僕入偵誰為觧元者僕奔告曰秀才為觧元宋不知􅀁以乆乃知之胥既改謄錄􅃃而真􅃃送武成廟乃使刁景純往改之時天大雨刁著水屐混渾扵羣胥中得􅃃改之宋遂無虞既殿試景文為第一以其弟也又方州貢士遂以開封觧元為状元景文降十名元獻不十年位致公輔祖父常云蘇子瞻有盛名而退無自矜之色此為過人祖父常云凌夫人早世貴公大族争􅁒􅁇室祖父悉謝之向傳範為南都留守祖父在幕中請妻尤迫及納幣辛氏辛外祖為駕部貟外郎畧無聲援士論甚美祖父云吾不好飲酒特嗜茶故吏惟孟安序朝奉分寕人􅀊以􅀟井一斤為餉知吾無苞苴之饋也又為陸農師作誌銘每􅀊以日注一斤為濡潤不亦清乎

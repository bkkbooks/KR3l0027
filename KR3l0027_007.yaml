front:
  text: 丞相魏公談訓卷第七
  hash: sha256:5b8e266cb469006e25d8c3a32dd571126f7a208af01a0c06cc23fb1874022dab
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0027_SBCK_007-1a}
body:
  text: 善言鍳裁遊從薦舉吳丞相與祖父相知特深祖父為開封尹舉孫莘老自代辟劉莘老為府推官後見吳吳曰舉二莘老甚善祖父使虜過北都潞公為尹禮意隆異窮冬盛寒必達旦每至夜分即呼工伎逼廳奏樂初疑其喧憒不喜所以久之乃悟近廳多籸燭可以附炎欲加恤而不欲為例特設故也乃知前輩事事有智祖父常云人生在勤勤則不匱戶樞不蠧流水不腐此其理也祖父常言平生未嘗處妻家雖偶然不可為常每常戒子孫勿逺親庭而淹泊妻室也杜和叔沂祁公之子公惟一子以公致政除南都倅使侍親側祖父為留守推官杜荐改官以溢格不用仁宗時選人引見上親視其閥閲一士人舉官二十員上駭訪之乃執政之甥止與循資曰若不沮止寒士何由進故改官而荐章多者皆自削其名其後祖父為右丞相杜以正卿致仕以中散大夫歸元符三年象先調廬簽過宋杜年八十聰明不衰說曩時事亹亹不已親至河亭相訪時已四月猶致山藥數稱俾供甘㫖手書作簡如少年茟跡范堯夫宰襄邑興修公宇宏麗壯觀如大郡府不免科買材木瓦甓膠漆之類用民財力為多繩之以法殆以祖父為府界提點同寮與府官多窺伺之祖父力為保全極口借譽荐之于朝范感激不已後每有書皆親札前幅書年月稱門人祖父既為孫趙二公及諸內相所荐文繼先世上問誰人子執政具以對時方患館職員冗如梅堯臣宋敏修皆同時被舉試入等止得出身㦯升任􅍦祖父奏章上仁宗即令與館職曽祖常謂祖父二百口之長也逮祖父居潤聚族建第不啻二百口盛文肅來謁曽祖見祖父與叔祖皆幼稚拊其首曰人丁強壯初髙祖既令曽祖裁啓見盛公時盛知揚州曽祖丁劉夫人憂未常出不得已謁見公大喜相與如平交遂留居於維揚闢衙東門仗舍俾居奉几筵其屋至今存焉盛文肅公善藻鍳知人之貴賤壽夭蓋左氏所書之遺法也在揚州有鄭州推官夏有章來謁才雋可愛又善為詩公待之甚厚留連燕飲纍日夏感公顧遇臨别獻書以謝而題其封曰圃田從事公一見即擲還不復見夏不知所謂惶駭不能進退懇郡寮覘公意公曰此人必終于圃田從事矣某忝前輩今簡傲如此志已盈滿其能久乎未幾夏舉館職㦯言其無行報罷竟以奉寧幕直國子講以卒此與左氏視髙步逺志不在盟受玉髙卑可樂而哀以卜人之死生存亡利害禍福者何以異也曽祖亦得盛公藻鍳人物之理初見富公未許台輔一日早朝天驟雨持蓋者不至衣已沾􅊜久之乃來公不問色亦不變曽祖謂祖公曰人言彥國必為公輔今日觀之非妄也曽祖為太常博士韓康公方年少同祀祭致齊太廟一見許以公輔後康公見祖父曰某受知先公最在衆人之前也祖父少時從舅陳孟陽善相謂祖父曰吾甥神采秀拔風骨瓌竒當為台輔然眉重壓神中年後有喜必有憂眉為之灾也陳亦有詩名髙士也老榜有官有集行于世祖父亦得文肅藻鍳之法治平中見范堯夫以謂必有名位范罷帥而蹇馬羸僕處之怡然期范必作宰輔元祐八年祖父罷相范再入復拜相宋元獻自安州赴開封試良玉不琢賦重疊用名字既悟遷南薰門外將治歸裝胥偃內翰為館職主文柄挾卷厠上改藴精二字以第一處之及榜將出使其僕入偵誰為解元者僕奔告曰秀才為解元宋不知所以久乃知之胥既改謄録卷而真卷送武成廟乃使刁景純往改之時天大雨刁著水屐混渾于羣胥中得卷改之宋遂無虞既殿試景文為第一以其弟也又方州貢士遂以開封解元為狀元景文降十名元獻不十年位致公輔祖父常云蘇子瞻有盛名而退無自矜之色此為過人祖父常云凌夫人早世貴公大族爭𣣔繼室祖父悉謝之向傳範為南都留守祖父在幕中請妻尤迫及納幣辛氏辛外祖為駕部貟外郎略無聲援士論甚美祖父云吾不好飲酒特嗜茶故吏惟孟安序朝奉分寧人歲以雙井一斤為餉知吾無苞苴之饋也又為陸農師作志銘每歲以日注一斤為濡潤不亦清乎

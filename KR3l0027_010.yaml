front:
  text: 丞相魏公譚訓卷第十
  hash: sha256:ddfe179648dc0a188ad153937b2a6746539222dd2406856ca0e6385197ccd1bd
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0027_SBCK_010-1a}
body:
  text: 雜事祖父既拜大學士集禧觀使入謝乃徹盖服御仙花帶盖寄祿官乃光祿大夫也兩宫嘆異降㫖張盖服毬文帶告街鳴杖子立宰相班盖異恩也八年九月出知揚州哲宗始親政因陛辭尤加眷禮問為政大畧與人才能否祖父奏對移時至郤御膳且有召用意明年西京留守闕首命除祖父當過闕陛對祖父以老再辭不聽既行次符離而衛國夫人薨懇請南歸復知揚州時紹聖元年明年再請還政章累上哲宗特命拜中太乙宫使又一年復請老哲宗聖諭令且降詔而時宰奏得蘇某書𣣔得致仕有㫖檢例遂用杜祁公例拜太子少師致仕國史祁公傳言前宰相未有一上章以東宫三少致仕者盖時相賈某嫉之也章雷州既罷以特進知越州過潤祖父遣二十二叔父四十叔父相見甚欵既而以簡謝祖父曰到㑹稽不乆則丐閑将卜居京口異時當從公杖履之㳺也翟思子乆祭祖父其云問萬事扵伯始無所不知梦两楹扵殷商遽然求訣寔其子汝文代作常語人曰此惟蘇丞相可以當之元豐時彦榜二十二叔父登科是時祖父出從外補有表謝上首言方主臣之負罪適孺子之逢辰報始傳郵慶叢私室又曰一門在仕三世决科逮扵群從之間繼有策名之美斯亦聖代衣冠之盛事不勝逺方父子之遭逢盖是天禧至是盖四世九人登科矣象先近見祖父是年四月與十六伯父書亦言念二得科名家門之慶想同歡慰至元祐馬㳙榜象先䝉㤙賜第至是五世矣此六事合在前昨見伯父房折弟植殘稿中有之今並見此卷之首祖父嘉祐中在舘閣曾祖召飰如期而往傳命者云請帽皆就坐祖父令禀白京局小官自来衫帽不以擕行欲幞頭簉席曽祖甚喜盖前軰雖燕居未常露頭也祖父時子弟皆昏定晨省及侍膳白事率皆如此不若近時之苟且也祖父薨背賢士大夫祭文甚衆惟南豐曽相之文委曲周盡頗無遺事若行状然學士畢公仲㳺自言韓富亡有司馬司馬亡忠宣是侔忠宣亡後舊相惟公今公又亡故老遂空鄒道鄉曰某常聞公之緒言矣學至扵絶學心至扵無心消息盈虚自與時㑹世雖欲親疎利害之不可得也文皆冠絶一時陸農師挽詩云始知夷險異髙卧㸔南行亦紀寔也此二事亦殘稿中所蔵者東坡常称東漢多名莭之士所以能扶危持顛者幾百年雖曹孟徳之奸雄亦畏名莭故終躬不敢取漢一日與大人語及大人云近見新貴人爲人作誌文頗譏東漢之士專爲詭行盗名其風不可長東坡大駭固問誰作不得已言之東坡云可作数字罵此小子大人不應乃曰只教折了胡孫三十年艸料安厚卿父爲三司吏曽祖爲判官見而異之以謂與胥吏不同必有厚福每令祖父禮待之祖母兖國夫人来歸使幹禮席之事安甚盡心後爲正議大夫致仕年九十而卒每子孫在側必以曽祖教子以訓飭之祖父常言韓正獻教子嚴肅不可犯知亳州日第二子舎人自西京倅謁告省覲康公與右相及姪柱史宗彦皆中殊科歸公喜召僚属之厚者俾諸子坐扵一隅惟持國多深思必有義方之訓託疾不赴坐中忽云二郎吾聞西京吾疑獄奏讞者其詳云何舍人思之未得已呵之再問未能對遂推案持梃大詬曰汝食朝廷厚祿倅貳一府事無巨細皆當究心大辟奏案尚不能記則細務不舉可知矣吾千里外無所干預猶能知之尔叨冒廪祿何顔報國必𣣔撻之衆賔力觧方已諸子股慄累日不能釋家法之嚴如此所以多賢子弟也祖宗時進士甲科推㤙無定制㩀人才收用陳堯咨状元及第曽㑹第二人皆直史舘知大藩陳州人得閬州㑹江南人得宣州而第三人才得職官太宗朝状元王世則止得司理參軍後至樞宻使吕文靖少時伯父司空不以任子荐之宗親為言司空曰彼當自致公輔豈可以門閱卑之後中甲科為職官月俸五千八百乃約家人日用不過百金有餘置竹筒盛之一千以供太夫人一千以卑内子八百以備伏臘竹筒之積具飯以待同寮上下欣然無不足之色後果繼世父官鈞慶院賜晏官食方暑不可下箸曽祖居與相對兖國太夫人治家乃排五六十位但具匕筯置白餅縷肉飯下飯瓜姜醎豉尔人人至者自食飽足後吕司空每見必戯曰未常忘一飯之德也祖父常言在舘中時雇得一婢問其家何為云住曹門外惟鎚石蓮問一家幾人各何為云十口皆然無他業初甚訝之又云非􅍦某家一巷数十家皆然盖夏末梁山泊諸道載蓮子百十車皆投此巷鎚取蓮肉貨扵果子行乃知京師浩瀚何所不有非外方耳目所及也祖父為省判判剥馬案行衆争取死馬而不取駝牛以謂馬肉耐乆埋之爛泥地中經宿出之如新為脯腊可敵獐鹿皆税居曹門隣巷皆貨之醎豉者早行其臭不可近晚過之香聞数百歩多馬肉為之祖父又言常歩至門外見臭河中浸弊草破履皆将為㳿子者京師無棄物所以皆人人粗給祖父常言忠信度量豈惟士大夫貨殖猶然孫賜號本行酒家博士誠寔不欺主人爱之假以百千使爲脚店孫固辭主人曰不責還期也孫曰請以一歲爲約先期已還足貨扵人者不計其可償其貨漸侈大乃置圗畫扵壁間列書史扵几案爲雅戯之具皆不凡人競趍之乆之遂𨳩正店建楼漸傾中都太宗上元爲微行至其家孫巳預知盖耳目廣又結中貴人得其歡心上與柴都尉数公往孫出致恭呼大人先集京師名姬妙藝杯盤精好羅列扵外上大喜酒十行将散乃前致謝曰家有間處願諸大人一臨太宗與諸公相頋駭喜及至其廳事杯杓器皿陳設歌舞尤盛遂使其女弹琵琶献酒侍上傍通席極歡而罷坐中使柴都尉取錦綺金銀卑之固不受及明上使勞賜召其女入其後寵以正位號一日上使扵奉宸庫取真珠擇其圎者為数珠不足妃侍傍曰妾父好畜異物碩令一使往問之孫黙記曰数年前有一行頭寄真珠一箧為信云絶大未常開也乃引使扵蔵私帑室塵埃中取得之元未啟封發視乃喜賜銀百星一日上置晏西蜀進酴醿種方開上與妃后賞玩孫妃曰妾家亦有試遣問之乃進十合上大駭以為竊禁中種使往視之則其本大扵禁中数倍矣孫貸扵人者前期而還人貸之者不復問数月則㷊其劵不可勝紀有一行頭貸萬緡三年為期不至故以大珠為謝孫之致富皆以信與量而已孫居與向相敏中為隣向闕宅後地一方未得完備及孫死妃亦得罪以憂卒向𣣔圗其地孫氏鉅富豈可得一牙儈見向曰相公𣣔得宅地乎請以十年為度某将致之向初不為然後十年牙儈持帳来賀曰廣地如期矣大喜不問價髙下亟售之又以百千與牙儈而問曰始汝𣣔取孫氏地以廣吾居孫巨億萬無可得之理今汝言果然固以異矣且汝必以十年為期何也對曰孫氏諸子其隣扵相公者第幾子殿直不惟日縦酒博奕狎㳺無度又日有㳺手数百人田獵逰燕日賦無藝某計其所分不過若干十年必盡而貿所居矣向大賞異之胡武平樞宻䔍信鬼神任州縣事湖南有一士人家世白屋旣登第母死𣣔迎父之官父不肯遂鬻一村婦使侍父傍乆之父與之處如伉儷士人罷歸知其父意稍加以禮後移令固復請迎父父又不肯在官以書省其父乃以嬢子謂村婦以順適父意乆之父與此婦失歡怒投觀中為道士数日復歸又遣召婦及士人改著作郎知湖北一縣又固迎父父又不肯踰年卒士人奔歸婦㩀堂上為真母久之呵罵子婦不已䆮以杖捶之士人不勝其憤遂還其杖婦仆地曰毆母不孝走之郡且持士人書以往郡如言究治士人具陳本末然父既命為妻又常以母称之無以自明遂承敺母每至錄問輙不承既三移獄使者乃使武平鞫其情武平既至齋七日求梦扵神七日晨起梦㦯呼曰何不問道士武平悟曰道士不當有室家亟使訊觀中父既歸度牒何在乃尚留觀中未納也武平曰此尚道士不當有室家如此非母矣報使者士人遂自明武平為殿試詳定官長齋戒沐浴禱於神求可為魁者首拈一卷帋藉精好書札真楷遂定為第一乃章子平也曽祖慶暦初為翰林學士所賜金帶後祖父為侍郎尚書以至翰長皆服此帶以為傳世榮耀晚年復命工人修治訓飭子孫它日官當服者即付之今緘蔵季父位大人元豐中為㐮邑丞髙䴡遣使趨闕隆冬過境邑宰柯仲常與同寮部人卒擊凍挽舟提轄中官陳衍風邑官戎服持柱斧行督大人曰吾軰豈可為此服率不易坐胡牀臨視衍大怒劾慢令神宗付提點司體量楊康功保奏無它事遂平大人為㐮邑丞王冲党侣侵軼京畿朝廷遣燕順為提舉捉殺縣官迎見順自坐南面設邑官坐東西向大人望見諭同寮曰此豈可就坐不揖而退其其事扵府奏之神宗大怒罷順罸銅三十觔人莫不称快云所謂仁者之勇也大人從三司使李奉世辟監景陽門後舉京官以啟謝之曰凾谷著書遥想真人之氣夷門擊柝敢􅌽公子之車李大称賞不已後見其子弟皆能記之祖父宰江寕楊告諫議為守常曰公治邑無一事不中理公無過矣祖父曰縣道繁劇多過公罪日積数十但公過以百数某自知之出扵無可奈何但頋人情何如而無私心尔豈容無責不敢不置懐也告驚曰此三十年為吏者不能知公知之何患不治大人宰富陽富陽大邑號難治既至究心民事辨滯訴数十遂以大治子瞻見祖父曰聞富陽之政雖古循吏無以過祖父知婺州大人侍過㭇東坡為倅自明乆講宗盟之好東坡称祖父為宗叔府㑹外自請逰西湖終日将起曰明日欲復􅌽宗弟先是東坡錄近詩一卷呈祖父祖父和之大人亦繼作大相称賞祖父謝其敦䔍明日遂遍㳺湖山頗有詩什及大人還赴亳椽子瞻謂曰鄊人楊元素守亳煩附一書并致子由一信及常茶一瓶盖東坡𣣔致委曲荐大人於元素而不欲言故託以附子由信後見書果言宗椽乃丞相字子督學有文而沉静若愚剛毅不可犯及見元素稍異待既而陳述古自旁郡移南都過亳復有㫖還舊任大人為作樂語云銅符方拜新留守竹馬還迎舊使君楊陳大喜自此相知尤深督學字不知别有㩀否象先常得髙祖以来所用李廷珪墨一挺於祖父使寳之長四寸濶一寸厚一寸其色之黒世無物及者研之無聲一面有李廷珪墨四字象先常得楷木笏於叔祖奉職乃髙祖舊物孔墓之三間槐也長尺有四寸厚五寸濶二寸半紋似松而有鱗理兩邊二紋徹上下透内外如間道故謂之三間他䖏所見殆未有及者祖父初拜尚書左丞相請扵朝以潤之因勝院為墳寺且乞以因勝報親禅院為額既得請仍以舊住持人道澄主之適黄山谷見訪延之書院語論甚欵仍俾作請疏黄坐上立成曰因勝得名舊矣報親自天錫之山月林扉㦯改衆人之觀粥魚齋皷豈異嚮時之聲舊住長老澄公透黄龍之三闗用林濟之一喝􅍦以道為伴侣不随世而陳新瓶水爐香終借松楸之潤曉猿夜鶴将從杖履之㳺今集中無此文故見扵是祖父常云俳優非􅉸稽㨗給善中事情能諷諫有足取者仁宗作賞花釣魚晏賜詩執政諸公洎禁從館閣皆属和而徘徊二字無他義諸公進和篇皆押徘徊在坐教坊雜戯為数人尋訪税第至一宅入觀之至前堂之後問所以曰徘徊也又至後堂東西序亦問之皆曰徘徊也一人笑曰可則可矣徘徊太多尔神宗勵精求治博訪人材雖州縣小吏亦引之登對春晏優人引数軰牽一驢至殿階衛士叱之復来不已問之曰汝何人敢牽驢子至此𣣔何之對曰我以謂有脚者皆可上殿尔鄧綰為中丞時譏其不盡言一日優人進戯作都水官数人共議秋水泛溢将閉汴口以免泛濫之虞一人曰丁家口可開乎曰多良田不可又曰杜家口可開乎曰經渉州縣不可開一人曰鄧家口可開乎乃曰此口奉勑不得開耳哲宗為延安郡王奉晏侍坐上旁優人指曰此為誰乎㦯曰皇子大王曰非也又曰太尉相公開府郡王皆曰非也然則為誰曰假承務郎時新行官别任子多為假承務郎位最卑四者皆得天顔一笑傳播都下皆祖父侍晏所見者於父言康定歲春間侍曾祖居西岡與二蔡賢良同學時二蔡赴試畢榜将出率祖父同至巷前聼響卜約以二姓皆執一物㦯鏡㦯磬㦯刀先聞而無情者為凖才出巷忽聞一散從官執杖子呼云下引作去聲諸君相頋曰事可知矣乃中丞作考試官畢歸第尔既而二蔡果不遇於父平生喜讀荘子及守濠梁荘墓在開元寺乃賦百韵詩理趣曲盡荘生之妙祖父常言㓜時華直温相率至其家每日将晚群婢取燈盞数十漬以水取易涸者去之恐其耗油也治家有理盖事事可法如此祖父常得徐鉉李王墓碣云武侯以﨑嶇之地拙扵應變偃王以仁義之師終扵亡國當時以此得罪太宗終躬不復召祖父常説在滄州時有一漁師献一魚如戴作冠婦人所戴謂之垂肩者因言海中色色有之世所有之物皆有肖似者犀如牛江豚如猪腽肭臍如狸此衆所知所見者竒形怪状不可勝紀每有献異物者皆爆以為腊寄公庫甚多有如美婦人者有如嬰兒者有如翁姥者皆可駭異一日漁人獻一腽肭臍置一大桶中以水飬之鮮健善啖可乆飬祖父恐其失性傷生不納之後元祐中有挈至京師者自王侯戚里富豪之家無不取觀所得甚厚謂之海哥亦常轉入禁中甚有謡詠不知是何祥也祖父為尚書左丞劉莘老作詩感舊言懐祖父既和盖是時執政侍從館閣朝士皆和李格非既編集又作序以傳惟中書傅欽止和公字韵一聫云此時廊廟聫三省它日貂蝉㝎兩公時以詩䜟盖祖公任左丞相劉黄門傅中書范堯夫罷相劉公遷右揆明年劉出而傅已前卒祖公遂大拜傅果不得相是乃它日貂蝉定兩公之䜟也陳秀公知揚州坟墓在潤常請扵朝每歲寒食十月旦乞至郡展省如所請故林希後作公挽詩言傷心父老江津路猶想當年上塜行謂此元祐八年祖父罷相以集禧使居京師更厯之時出守廣陵遂援前比亦乞以時過家上冡得請故祖父謝上表云淮海奥區名在九州之列松椒故國地纔一水之遥縁近歲守臣之文有過家上冡之例揚州芍藥冠絶天下盖京洛牡丹之比慶曆中韓魏公出鎮倅簽則禹玉介甫也春時後圃一本發四葩竒甚魏公扵圃中㑹四客以賞之乃重䑓紫花金束腰土俗謂之楼子芍藥宿約一客及期以疾不能赴公命於河亭索牌欲命一客足之是日過客絶少􅍦有一陳莭推公不熟何人乃令邀之即来乃陳暘叔也後四公皆至宰輔祖父常對客話之後象先為郡糾曹州人尚能言之元祐七年祖父與吕微仲同為相暇日因言大人累任京局且以宰執子弟例除館職欲以用之祖父荅以館職乃朝廷育才之地豈可令子弟以例得之吕唯唯而已熊本侍郎常梦祖父遺之三硯熈寕三年祖父知制誥以屡繳李定詞頭不艸制罷職熊遂召試元豐六年祖父自吏部侍郎丁秦國太夫人憂熊乃除天官貳卿元祐初祖父寝被知遇熊心不能無觖望而止於侍郎以沒豈造梦者故相戯謔邪其偶然也蘇魏公譚訓十卷公之意苐欲示訓子孫不祈於傳也泌既得之於公之曾孫無為判官煇因刻之郡府紹熈癸丑孟夏八月濟南周泌

front:
  text: 丞相魏公談訓卷第五
  hash: sha256:3fb073de9b844b00fac2843356b77dd169d62ef2c92310e5756a6a9f41dd7f5d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0027_SBCK_005-1a}
body:
  text: 前言政事孔道輔為御史中丞勘馮士元事盡法不阿仁宗稱之有意大用時大臣與士元通奸私者程參預琳道輔既得其情矣而退傳張鄧公不喜道輔張曰公所以致此者誰之力也非程公不致此道輔悵然愧而德之不數日上殿遂力救解上大怒貶程亦黜道輔道輔既為張所賣感憤得疾死中路祖父常為東坡言載之志林韓大參忠獻之第八子司門郎中諱嘉祐中知穎州時京西大疫流殍甚衆公賑濟有方郡人賴以全活者多乃揭榜鄰境諭以救恤之意使來就食鄰郡之民襁負而至來者既衆穀食不足又聚衆稍多無寬廣之居㦯感疫癘飢病相仍死者頗衆韓公亦感疾而亡其秋鄰郡士人夢召至隂府將使治韓司門賑濟獄士人乞假治後事及覺得疾旬日卒祖父言賑濟雖為政之急務當量力為之不必廣其聲廣其聲而實不至則至者反罹遷徙飢疫之患是速其死所以有隂禍杜正獻為相蔡君謨孫之翰為諫官屢乞出仁宗云卿等審欲缺一字郡當具所欲奏來於是蔡除福州孫除安州正獻云諫官無故出終非美事乞且依舊上可之退書聖語陳恭公為參政不肯書曰吾初不聞正獻懼焚之由此遂罷相議者謂正獻當俟明日覆奏不當遽㷊其書正獻云始在西府時上每訪以中書事及為相雖中書事不以訪公因言君臣之間能全始終者為難也祖父常以語東坡載之志林曽祖丁憂居江寧朝廷除知江寧縣江寧六朝建國又李氏故都户口繁夥民俗嚚訴號為難治祖父未至遍訪老于為吏者如曽伯祖判官與祖姑之夫楊殿臣皆曰抑强扶弱興滯舉敝民之豪縱者不可恕柔謹者必深與之僧道牙儈胥吏有罪皆不可赦祖父初佩服其言久之惟念強弱無狀何從知之顧理如何何扶抑之有豪縱者㦯有理何可不受柔謹者犯令何可不治且不可以貌取僧道偶涉于事當以曲折為斷至於牙儈胥吏與豪縱之說雖同其言未可為盡也當思理之所在而已詞狀日千𥿄祖父謂邑民曰令一耳目不採人言若察多未能遽察吾聞汝􅒰每投狀州縣即泊于店肆主人利於汝數至久泊必巧言留汝汝今投牒宜即歸休勿留俟吾審核可否可行即命耆保召汝不可即懸榜於門告汝汝以為不然即之府㦯監司訴可也唯鬪毆傷犯者先治之百姓乃去積一月詞狀幾萬餘𥿄乃以暇日缺三字十事可行者無一二乃分置之昏田者置于甲爭辨者置於乙分財者置於丙丐公據文移者置於丁於是出引使耆保約日呼兩詞皆來為之區斷缺一字不十日而畢其不可行者皆榜喻之自爾積滯詞訴皆盡日惟詞牒數十而已民大歡悅楊告為守老於為吏以循能稱大歎服焉每開晏㑹客即曰江寧無事可從宴集也祖父在江寧有出役老胥喜訴州縣借詞撓法上下畏之祖父始至請給告捕鹽賞未與恃醉而悖祖父曰此頑民不可不治也榜之數十日莭其飲食困而後痛笞之胥再拜曰某知畏矣自爾不入公門矣出曰我為吏數十年出役亦十年前後犯法被杖數十無如今曰遭此少年縣宰吾知過矣自是改莭為善不入公門家至巨萬卒為良民每為人言吾晚得端居溫飽蘇宰之賜也祖父自江寧有訴民田者縣以為不直笞之乃詣州暨憲􅒩每笞焉祖父初至復下縣理之祖父即為剖析其不可者之理詳喻之其人大驚曰聞如是之言方知前非矣陳龍閣世稱循吏知䖍州遭歲荒有劫禾者千餘人龍閣平反奏讞悉從末减歲大稔流民歸業公有詩曰春來活得千人命秋後還收數倍禾莫道使君無善政從教吹作竹枝歌乃州人美公之詞祖父知杭州執政曰本朝不以從官守杭者惟張乖崖今公亦以祕監往雖寵命未優而借重可見况乖崖之日歲荒民飢正與今同治荒之政諉公非不厚矣祖父既至平易不優唯民所利悉因之所以賑濟拊恤之偹至民遂安堵至今言及蘇公即以手加額其後奏對神宗語及杭事上曰錢唐之政民至今歌詠祖父知亳州有豪民婦被罪當杖以病未科决每旬檢校未愈鄧元孚為譙縣簿謂大人曰尊公髙明平昔以政事稱今豈可為一豪婦人所紿公為賢子不可不白但諭醫者如法檢校彼自不誣矣大人白之祖父曰萬事付公議何容心焉若言語輕重則人有觀望㦯可有悔既而婦死元孚大慙服曰某􅒰狹小豈可測公之用心也祖父為南京推官歐陽文忠公留守府事悉以見委祖父每辭避之公不以為然告杜祁公曰蘇推不肯任府事似同形迹祁公曰不然蘇識致髙逺為幕官上有倅簽若專府事將有議者爾文忠公益嘆重祖父尹開封頗嚴鞭撲以謂京師浩穰須彈壓當以柱後惠文治之非亳頴卧治之比方試進士有博於肆樓者巡捕擒以來祖父問擲彩何為曰選官爾何許曰房中祖父曰舉人房中賭彩選市巡何預痛杖之內外􅌚愜祖父為南都幕歐公為留守日每監司至吏抱案求署者祖父曰吾豈與爾同爾豈須監司至後來署欺監司者乎平時稽留文牘豈得監司來然後求署得監司懲艾戒之甚善每監司至出城五里迓之事事有定式及歐公守亳祖父為淮南轉運使巡按至郡公逺出迎迓禮意隆重其相待如南都待監司者祖父以門生禮致恭公揖讓甚久乃連轡而行觀者如堵至郡益加禮曰修老病廢事官吏慢法恐妨按劾得公懲戒之幸也切勿形迹祖父曰一如南都時惟公案有不得公署字者公為絶倒祖父知婺州前此未有登第者祖父視州學庳陋形模湫隘乃徙之爽塏地建立宏麗是歲錢得循發解登第自爾登科者不絶祖父常說張去華侍郎狀元及第文章學問為一時之賢而孝飬之行逺追古人􅍦不逹政事自翰林尹開封事多留滯倒錯遂罷常有一人犯夜邏者執之以來公問何為夜行對曰以母病求醫問頗有見證否人皆笑之趙清獻平生留意釋氏常參圎照所至以寬慈為治晚歲自鄊里宫祠起知杭州杭人以其鄰邦大老又素長者頗喜其來父老出數百里迓之既至治以嚴肅不可忤犯鞭撲無所容貸官吏不少假借杭人大失望不知公意如何㦯曰亦如王肅三返祖父尹京軍巡按陳世儒家群婢殺其所生陳不以聞并其妻李氏皆在大辟李乃吕氏甥親党甚多神宗疑府中寬獄事時􅉝舅化光為中都官有所聞以簡諭大人令白祖父奏對之際宜領上㫖明日上殿上果首及此事云此乃人倫大惡而党附甚衆卿長者恐為衆言所移宜諭所司盡情推鞠祖父對曰此天下所惡但虛實未明臣每諭勘官但盡鞫實不可出入人罪而已其後人言祖父與吕晦叔善疑吕常請求及置對御史卒無一事掛吏議者

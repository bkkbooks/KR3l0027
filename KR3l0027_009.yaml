front:
  text: 丞相魏公談訓卷第九
  hash: sha256:1afccfffd181d1a137288817a1b208e165a1db365f80497fca1da6ec6bc126f7
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0027_SBCK_009-1a}
body:
  text: 道釋神祠疾醫卜相祖父云吾曽祖母代國夫人歸曽祖時賫裝中有北極北斗四聖像奉祀甚嚴自是吾家每至上七日必食素設香茶酒果燈燭奏冥幣焉曽祖十歲時有一道士自云善相髙祖令相曽祖云必達當以文章顯髙祖令贈之詩執筆立成斷章云它年躍馬相逢處記得先生舊姓名吕齊物少遊荆南亦云善相亦通三命馬亮為湖南安撫位八座有德于荆人逺地不間朝儀舉官之尊者必曰安撫尚書吕見祖公每曰它日定為安撫尚書以謂仕當致極品也祖父宰江寧有一僧善三命常閲祖父命曰一府不如推官當至宰輔但不及近日過客王簽判乃荆公也或曰王簽判如何曰有土諸侯祖父間喜鼓琴亦常擘阮常侍曽祖所得陳伯華侍御家雷琴既知亳州得太清宫道士王從之靜默真介恭和忠諒有自得之意非道流之比挈之入都引至太乙宫道衆皆善之陳太初尤重其淳野王鼓琴造妙又善斫琴京師謂之琴王師後二十年主宫事及宫庭災斥居九成觀政和中象先見之已八十矣聞其歸亳靖康中象先子壻韓晦為酇縣丞聞其尚在年九十矣髙太尉留心醫術得所謂以意為主者常云京師薑粥麻粉日活數千人不必藥也小民或癘飲一杯熟熱粥出汗夏中暍食一杯冷麻粉即皆愈矣祖父平生不信命術惟為南京幕時婺州衙前葛問精于星度常謂祖父如杜相公命説平生事殊不差後每至京師必來見南京有衙校與富公同年月日但生時不同爾使問閲之曰貴正在時此賤命與問等耳熙寧乙卯丁已間祖父在杭州天東南有聲如霹靂而震不止明日問居人窗牖什器皆動搖或至破敗祖父以為疑廖恩之祥小醜亦能動天然不知果何祥也曽祖權公安宰常遊二聖院前此一長老不出院忤府帥夏英公杖而俗之長老仍不出院乃謂院僧曰某無可歸願留院中作行者灑掃寺中久之益尊信復有人貿祠牒披度府再使住持不辭亦不出人莫測也祖父最重釋氏四十二章經以謂佛法至中國此經首傳猶儒書之論語也祖父喜禪宗見達觀曇頴尤契奧妙頴將順化以書貽祖父問及骨月委悉有托蔭之意既而生三十一叔幼而秀異生于頴乃以頴士為名每書名以水為字年十一侍祖父赴婺州舟敗沒于桐廬祖父言言法師常見之但似無心人祖父俾書一紙後有頴字人謂頴州之應仁宗求嗣使書之末幅有十三字英宗行第十三祖父亦以其吃餑飥為無心李文正公沆篤好內典啓手足之際了然不亂其弟尚書維亦無疾而終幼措心浮圗之説尚書將終戒其子以死則削髮披緇為比丘諸子謀于楊大年大年以謂儒者不當為異服而治命不可廢乃使置三衣于棺而葬祖父常推京口居第乃林肇之舊宅林仕江南為檢校太師宣猛將軍忠于所事乃為之立廟于宅之東北山間祖父常云在京師雇一女童乃常為童子卜者所以知人姓名年甲鄊里官爵皆有關訣語皆誕妄不可信也祖父為館職時常病寒不知人坐幃帳中覆以缺一字衾衣重裘而戰栗不已六七日幾絶家人號泣不知所為有鄭叔熊監簿者泉州人鄊里號神醫適來京師召使診視鄭曰此中熱耳乃盡脫衣去衾復使當軒設浴斛坐于中沃冷水寒栗不可奈氣𣣔絶懇求止水不可增之不已久乃覺氣蒸欎上騰如發甑釡乃使挾置卧榻須臾大汗數日良已鄭豪邁如義俠在中都果以醫顯

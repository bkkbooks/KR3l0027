front:
  text: 丞相魏公談訓卷第八
  hash: sha256:bd63e1fc9d1186ab066de062270a060e6720b314a578e7d194dfef828e90361f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0027_SBCK_008-1a}
body:
  text: 恬淡器玩飲膳祖父應舉之年元日遊相國寺時浙本中字前漢書方出祖父戲撲之為錢五千十三淳一擲皆紅鬻書者曰未常領所下金祖父遂行不取衆亦皆不平然以謂必有大喜慶踰月南廟試第一遂登科祖父在江寧太守楊告以門蔭入官倅幕同寮皆無登第者祖父未常一及文辭時象先外祖實倅府事祖父生平喜飲茶而不喜飲酒家庭燕集不過三杯至五杯燕客不過七杯至十杯豐儉得中士人以為法曽祖平生厚于賔客之饌為三司判官與李少師同寮皆飲食豐潔常煮鱉清羮李甚異之求其法笑而不與祖父常云食不貴豐而貴潔味不貴厚而貴和祖父常云蔡君謨為福建􅒩聞一寺僧收鬼毫盞甚竒迃道訪之求觀果尤物也問可酌茗乎僧駭曰某藏之什襲數十年時出一玩豈可泚水後至京西又聞襄鄧間一僧畜葫蘆瓢尤竒亦往求觀復問可研茶乎僧亦驚曰此可玩不可研研則有折缺之患君謨嘆曰盞既不可烹瓢復不可研不知將何用世之有虛名無實用冒四廩祿者亦若此已矣祖父常云皇祐至和間諸公餞客坐有獻白蓮藕者數倍酬其直後十餘年頗紛紛遂以紅蓮藕為下品乃知時態愈尚新竒而入浮薄為可念也祖父喜食祿粟以為有五穀真味卜葬曽祖母日走山間或時羮臛未具先啖乾飯曰所謂稼穡作甘也祖父喜食雞豆以謂有五穀之甘而無三牲之爽溫平清香甘濡厚實可以療飢不廢坐談真佳果也祖父喜飬朝雞以為不惟質尚雍容文彩可觀聲氣和平飛鳴不迅而使人知日早暮有夙興之助又雞能收拾殘餘糞壤中無棄物馴于庭除尤可愛也祖父平生無玩好惟畜陳侍御雷琴顔魯公韻海商鼎周尊李誠山水徐浩左丞告時一展玩爾祖父常于相國寺置得閣本法帖十卷甚竒其末云玉堂夜直蒙恩賜到受恩如是激莭可知用公髙之裔圗書乃畢文簡公賜本也文簡以圗書斥逺祖名未中禮祖父奕棋品格甚髙乃天性也常以謂廢時亂日平生不復留意矣

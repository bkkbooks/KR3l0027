front:
  text: 丞相魏公談訓卷第四
  hash: sha256:0f52bb80060bec5a6c5e2f94f117b61ecb160f951c3bbe22b882f53c419a460e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0027_SBCK_004-1a}
body:
  text: 文學詩什梁相為審刑院詳議官從官長奏何次公事仁宗曰漢有字次公者為誰有幾官長奏臣廢學久詳議官梁適名家子乞召問之上問適適對黃霸字次公蓋寬饒亦字次公上大喜頃之除御史由此至大用祖父謁王原叔因論政事仲至侍側原叔令檢書史指之曰此兒有目録之學祖父受知二宋常謁元憲公曰舍弟子京于文章少許可􅍦稱君文典重而清新及見景文亦曰家兄丞相于文章少許可每見公近文常稱嘆不已常云非􅍦句句有來處兼意義清新非近世之文也常言為文之體意不貴異而貴新事不貴僻而貴當語不貴古而貴淳字不貴怪而貴竒二公為文不同而皆相知如此祖父與東坡同在金華因論作賦之方坡云某昔與鄊友課賦日編二十事所謂日計之不足歲計之有餘也祖父曰此乃賢良課程爾喜晏元獻歐文忠小詞以為有騷雅之風而不古不俗尤愛聲韵諧偶然未嘗自作一篇曾祖得雷琴乃故福唐太守陳伯華侍御物黃聱隅覩之感愴黃常館于陳氏陳待之甚厚伯華晚歲以贓獲罪遷謫而死祖父觀作詩紀其事聱隅即度拈澄心堂𥿄數番一揮而就三十韵頗淳古其略曰福唐太守天下才好事求竒竭巾楮有時觀我靜袪懷到處尋幽間笑侣一朝薏苡足人疑萬里珠璣同夢覩樹墓休提孤劍鐞星垣忽見清絃古好物終難寂寞留髙門即是從容所幾年何地各兮飛此地當歌忽胥遇還記當頭灑淚人同是從前舊承顧中郎一見厚難忘柯亭有竹君知否劉原父豪邁超軼博極羣書文章瑰瑋唯不喜詞賦嘗謂祖父曰縱不取髙第亦不能為州縣之職祖父曰審爾當習賢良二叔祖作賦甚工每笑之揚置榜劉下第叔祖初考狀元以疑混聲知被黜次賈黯榜試戎祀國之大事劉賦如神助警句云仲尼明三慎之文惟齊及戰箕子陳五事之目在祀與師考為狀元以執政親嫌降第二名衆為不平叔父第五甲乃知科舉非人力也祖父為南都尹劉莘老為簽判待之甚厚慰荐之及尹京再辟府幕劉後為門下侍郎祖父為左丞為詩貽祖父膺門早歲預登龍儉幕中間托下風敢為彈冠煩貢禹每思疾缺避胡公不久劉拜右僕射罷祖父繼拜右相吕溱榜試三年大聘韓康公與其弟黃門及右相姪柱史皆髙中無名子嘲之曰府試三年大聘昌黎四子登科以譏主司之有私意正獻聞之俾四人皆不赴省後榜正獻罷四人皆登殊科乃知主司無意也吕文靖當朝正獻登科在第一甲未唱名先奏于朝自言公著詩賦得意恐在髙等致嫌疑乞降十名後竟從之祖父亦試三年大聘髙中至元祐巳已凡五十三年􅍦祖父與韓持國三人在富公常云朝廷重科名即得王文正韓忠獻宋元獻李文定諸公不重科名則得章衡羅愷王俊民劉輝但非人事亦是天時也鄭毅夫滕元發皆有場屋聲鄭賦妙絶惟思遲應天以實不以文已預殿試自覺不工故曵白而出後廷試數自度不居第一故不終場至圎丘象天得意甚宋子京為試官侍殿陛即案傍視之鄭展卷宋但云挑起著破題初云大體必簡圜丘自然挑云體大必簡丘圜自然遂冠絶果狀元及第元發詩最工為第三􅍦楊元素蜀人無中都之譽遽在滕上謂鄭那得此人來厠我輩鄭曰彼亦有蜀都之譽未易輕誚也滕遂改觀東坡自徐易湖守過闕不得見大人監封丘門以簡問勞且以坐局不獲見為言坡答簡曰便道之官恨不得見詩人耳唱酬詩什簡尺頗多皆為人取去祖父常云劉貢父強記在開封同學方幼衆令誦霍光傳諸臣奏事不遺一名蔣頴叔父為江寧簿祖父為宰蔣方幼侍其父來亦能強記其父每呼令誦書史不差一字故頴叔為曽祖母祭文云在昔先人佐夫人之子之竒於夫人義猶祖母曽祖在翰林忤時相以朋黨譛于上出從外補既而丁髙祖憂服除再入翰林宣召有朝路復清還卿禁直之語然才八旬復以侍讀知河陽有進士王度獻詩曰風摧秀林木色變附籃絲曽祖甚愛重之髙祖謁盛文肅令曽祖作啓事其略曰爰從羈貫之始頗能篆刻之工决考秀之科早偕郡計下賢良之詔濫簉公車蔑左右之為容加疏逺之無恃下臣充賦敢矜朝錯之辭考官不留遂棄劉蕡之策盛大喜曰此文可施于制誥公能不廢茟硯如此乎髙祖曰某廢學已久乃學生代作公即相召曰願一見是時曽祖丁內艱不出髙祖以盛公名重令曽祖製裹而行一見大器重期以逺到後遂荐于朝又舉應賢良由此顯用故曽祖宰無錫中丞王隨送行詩曰江吳寧久次知已在朝端為文肅諸公言也祖父元祐三年為廷試詳定得李注元發以為胸臆瓌竒文章浩博似史遷論事有本末布衣而知天下事似陸贄欲以第一人蘇黃門諸公皆不悅曰適出一曽收又擢一曽􅌈不可意不能奪才得乙科士論惜之祖父常云司馬遷文章所以竒者能以少為多以多為少唯唐陸贄得遷文體祖父平生喜元劉詩尤愛其押韵精到曽祖宰無錫朱正辭為轉運使巡部至邑不復訪職事惟相從晏遊纍日朱公卿子少以文辭取髙第而以吏才困于外補曽祖因和其詩曰一篇此日摛鴻藻五色它年浴鳯文朱大喜以為知已祖父每燕居皆令子弟侍膳每膳畢當戒飭子弟㦯講論古今亹亹不􅌒又常言桞氏訓序太保每以猪膽和黃連為丸令子弟含化使讀書不至困寐故皆篤學有聞爾􅒰當效之祖父言王沂公為舉子投贄梅詩曰如今未作和羮用且向百花頭上開人謂必作狀元宰相也祖父常云王文考父逸欲作魯靈光殿賦使文考至魯尋訪事迹文考乃自作賦呈逸逸異之問其遽作之故對曰大人年髙恐勞心爾此可謂承顔順色也祖父過北都與潞公唱和以逋峭對􅉸稽花十八對東西遂賞嘆不已曽祖調無錫宰過金山題詩曰僧依玉鑑光中住人踏金鰲背上行人以為必作翰林學士後十年果為內相祖父言歐公不言文章而喜言政事君謨不言政事而喜論文章各不矜其所長而誇其所不足也祖父言吾少在洪州假黃庠建章集百餘卷所謂千門萬户者後曽祖為三司判官晏元獻為使每剪箋簡之餘置案上得異事聞竒字即抄之貼以大册㦯以簽貼之每用一事即除去後積甚多次第編入抄類㦯謂之類選云晏乃邀黃至門下他客尚數十人使抄莭史書黃去取之晏公出於一手編定祖父為韓康公挽詞云三登慶曆三人第四入熙寧四輔尊又為吕申公挽詞云兩朝京兆尹三世老司空皆切當康公秋試省闈殿試皆第三自樞副參預拜相後為史館而申公與稚卿皆尹京文穆文靖父子皆為司空云
